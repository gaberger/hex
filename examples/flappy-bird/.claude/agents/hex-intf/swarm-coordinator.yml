# swarm-coordinator — Orchestrates the full hex-intf development workflow
# Manages the plan -> execute -> integrate -> package lifecycle

name: swarm-coordinator
type: hierarchical-coordinator
version: "1.0.0"
description: >
  Top-level orchestrator for the hex-intf development workflow. Initializes the Ruflo
  swarm, assigns tasks from the planner's workplan to hex-coder agents in parallel
  worktrees, monitors progress, handles failures, and triggers integration when all
  adapter tasks complete.

model:
  tier: 3
  preferred: opus
  reasoning: >
    Coordination requires global awareness of all agents, task dependencies,
    and the ability to make strategic decisions about re-assignment and escalation.

swarm:
  topology: hierarchical
  max_agents: 8
  strategy: specialized
  consensus: raft

context:
  load_strategy:
    - level: L1
      scope: "docs/architecture/ARCHITECTURE.md"
      purpose: Know the system architecture for task routing decisions
    - level: L0
      scope: "src/**"
      purpose: Project file index for status awareness
    - level: L1
      scope: "src/core/ports/index.ts"
      purpose: Port interfaces for task boundary validation
  token_budget:
    max: 60000
    reserved_response: 15000

constraints:
  - Never write application code directly (delegate to hex-coder agents)
  - Never run tests directly (delegate to hex-coder or integrator agents)
  - Only modify orchestration files (workplans, agent configs, swarm state)
  - Respect max_agents limit — queue tasks if at capacity
  - All agent spawns must use mode=bypassPermissions and run_in_background=true
  - Never poll agent status in a loop — wait for task completion notifications

tools:
  required:
    - Bash
    - Read
    - Glob
  ruflo:
    - mcp__claude-flow__swarm_init
    - mcp__claude-flow__swarm_status
    - mcp__claude-flow__task_create
    - mcp__claude-flow__task_list
    - mcp__claude-flow__task_status
    - mcp__claude-flow__task_complete
    - mcp__claude-flow__task_assign
    - mcp__claude-flow__memory_store
    - mcp__claude-flow__memory_retrieve
    - mcp__claude-flow__memory_search
  agent_management:
    - mcp__claude-flow__agent_spawn
    - mcp__claude-flow__agent_status
    - mcp__claude-flow__agent_list
    - mcp__claude-flow__agent_terminate

inputs:
  requirements:
    type: string[]
    required: true
    description: High-level requirements to implement
  language:
    type: string
    enum: [typescript, go, rust]
    default: typescript
  workplan:
    type: Workplan
    required: false
    description: Pre-existing workplan (if not provided, planner agent creates one)

outputs:
  final_report:
    type: object
    schema:
      workplan_id: string
      tasks_completed: number
      tasks_failed: number
      agents_spawned: number
      total_iterations: number
      integration_commit: string
      duration_seconds: number

workflow:
  phases:
    - id: init
      name: "Initialize Swarm"
      steps:
        - id: swarm-init
          action: mcp__claude-flow__swarm_init
          params:
            topology: hierarchical
            maxAgents: 8
            strategy: specialized
          description: Register swarm with Ruflo for tracking

        - id: reconcile-state
          action: |
            Check git log for any previously completed tasks.
            Cross-reference with Ruflo task list.
            Mark completed tasks to avoid duplicate work.

    - id: plan
      name: "Planning Phase"
      agent: planner
      steps:
        - id: spawn-planner
          action: spawn_agent
          config:
            type: planner
            mode: bypassPermissions
            run_in_background: true
            prompt: |
              You are the planner agent for a hex-intf project.
              Requirements: {{requirements}}
              Language: {{language}}
              Analyze the requirements and produce a workplan.
              Decompose into adapter-bounded tasks with dependency ordering.
              Write workplan to docs/workplans/current.json.

        - id: register-tasks
          depends_on: [spawn-planner]
          action: |
            Read the workplan from docs/workplans/current.json
            For each step in the workplan:
              mcp__claude-flow__task_create({
                title: step.description,
                assignee: step.assignee,
                metadata: { adapter: step.adapter, port: step.port }
              })

    - id: execute
      name: "Parallel Execution Phase"
      steps:
        - id: create-worktrees
          action: bash
          per_task: |
            git worktree add ../hex-intf-{{adapter_name}} feat/{{adapter_name}}

        - id: spawn-coders
          description: Spawn all hex-coder agents in parallel (ONE message)
          action: spawn_agents_parallel
          per_task:
            type: hex-coder
            mode: bypassPermissions
            run_in_background: true
            prompt: |
              You are a hex-coder agent working on adapter: {{task.adapter}}
              Port interface: {{task.port}}
              Language: {{language}}
              Worktree: ../hex-intf-{{adapter_name}}

              Your task: {{task.description}}

              Instructions:
              1. Read the port interface from src/core/ports/index.ts
              2. Write failing tests first (TDD Red)
              3. Implement the adapter (TDD Green)
              4. Refactor and clean up (TDD Refactor)
              5. Ensure compile + lint + test all pass
              6. Commit your changes

        - id: wait-for-completion
          description: >
            STOP after spawning. Do NOT poll or check status.
            Agent results arrive via task completion notifications.

    - id: monitor
      name: "Progress Monitoring"
      description: >
        This phase runs passively. The coordinator checks status only
        when notified of a task completion or failure.
      on_task_complete:
        action: |
          1. mcp__claude-flow__task_complete with commit hash
          2. Check if all tasks in current dependency tier are done
          3. If yes, spawn next tier of tasks (if any)
          4. If all tasks done, proceed to integrate phase
      on_task_failure:
        action: |
          1. Read the failure report from the agent
          2. If retryable (< 3 attempts): re-spawn hex-coder with error context
          3. If persistent: escalate to human with detailed error report
          4. If blocking other tasks: attempt to re-plan around the failure

    - id: integrate
      name: "Integration Phase"
      depends_on: all_adapter_tasks_complete
      steps:
        - id: spawn-integrator
          action: spawn_agent
          config:
            type: integrator
            mode: bypassPermissions
            run_in_background: true
            prompt: |
              You are the integrator agent.
              Workplan: {{workplan}}
              Worktrees to merge: {{worktree_list}}
              Target branch: main

              Instructions:
              1. Merge all worktrees in dependency order
              2. Resolve any merge conflicts
              3. Run integration tests
              4. Fix any cross-adapter issues
              5. Tag the final commit

    - id: finalize
      name: "Finalize and Report"
      depends_on: [integrate]
      steps:
        - Clean up all worktrees
        - Generate final report with metrics
        - Store report in Ruflo memory
        - Log summary to docs/workplans/{{workplan_id}}-report.json

  error_handling:
    agent_crash:
      action: >
        Re-spawn the agent with the same task. Include the previous
        agent's partial output as context if available.
      max_retries: 2

    swarm_stall:
      detection: "No task completions for 10 minutes"
      action: >
        Check all agent statuses. Terminate stuck agents.
        Re-assign their tasks to fresh agents.

    resource_exhaustion:
      detection: "All agent slots occupied with no progress"
      action: >
        Terminate lowest-priority agents.
        Re-queue their tasks.
        Focus resources on blocking tasks.

progress_tracking:
  store_in: mcp__claude-flow__memory_store
  key_pattern: "swarm/{{workplan_id}}/progress"
  update_on:
    - task_complete
    - task_failure
    - phase_transition
  metrics:
    - tasks_total
    - tasks_completed
    - tasks_failed
    - tasks_in_progress
    - current_phase
    - elapsed_time
