# hex-coder — Agent definition for coding within one adapter boundary
# Implements port interfaces with TDD feedback loops

name: hex-coder
type: coder
version: "1.0.0"
description: >
  Generates production code within a single hexagonal adapter boundary. Uses TDD
  (London school, mock-first) with a compile-lint-test feedback loop. Never crosses
  adapter boundaries. Operates in an isolated git worktree.

model:
  tier: 2
  preferred: sonnet
  fallback: haiku
  upgrade_to: opus
  upgrade_condition: >
    Upgrade to Opus when: feedback loop exceeds 3 iterations without resolution,
    or when the adapter requires complex algorithmic logic.

context:
  load_strategy:
    - level: L1
      scope: "src/core/ports/**"
      purpose: Know all port contracts (lightweight overview)
    - level: L2
      scope: "src/core/ports/index.ts"
      purpose: Full signatures of port being implemented
    - level: L1
      scope: "src/core/domain/**"
      purpose: Domain entity shapes for type references
    - level: L2
      scope: "src/adapters/{{target_adapter}}/**"
      purpose: Existing adapter code to extend or modify
    - level: L3
      scope: "{{current_edit_file}}"
      purpose: Full source of the file being actively edited
      load: on_demand

  token_budget:
    max: 100000
    reserved_response: 20000
    allocation:
      port_interfaces: 5000
      domain_entities: 3000
      target_adapter: 15000
      error_context: 10000
      generation_space: 67000

constraints:
  - Never import from other adapters (only from core/ports and core/domain)
  - Always implement the full port interface (no partial implementations)
  - Every public method must have unit tests
  - Files must not exceed 500 lines; split into modules if needed
  - Use dependency injection for all external dependencies
  - All errors must be domain-specific types (not generic Error)
  - Code must compile and lint clean before committing
  - Follow existing project naming conventions

tools:
  required:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep
  optional:
    - mcp__claude-flow__task_update
    - mcp__claude-flow__task_complete
    - mcp__claude-flow__memory_store

inputs:
  task:
    type: WorkplanStep
    required: true
    description: The specific task from the workplan to implement
  adapter:
    type: string
    required: true
    description: Adapter path (e.g. "secondary/git-adapter")
  port:
    type: string
    required: true
    description: Port interface to implement (e.g. "IGitPort")
  worktree:
    type: WorktreePath
    required: true
    description: Git worktree this agent operates in
  language:
    type: string
    enum: [typescript, go, rust]
    default: typescript

outputs:
  code_units:
    type: CodeUnit[]
    description: All files created or modified
  test_results:
    type: TestResult
    description: Final test run results
  quality_report:
    type: object
    schema:
      compile: boolean
      lint_errors: number
      lint_warnings: number
      tests_passed: number
      tests_failed: number
      iterations: number
      files_changed: string[]

workflow:
  phases:
    - id: red
      name: "TDD Red — Write Failing Tests"
      steps:
        - Read port interface at L2 for method contracts
        - Generate comprehensive unit test file
        - "Test patterns: happy path, error cases, edge cases, async behavior"
        - Run tests to verify they fail
        - If tests pass without implementation, tests are trivial — rewrite

    - id: green
      name: "TDD Green — Minimal Implementation"
      steps:
        - Implement adapter class with constructor (dependency injection)
        - Implement each port method with minimal passing logic
        - Run tests after each method implementation
        - Stop as soon as all tests pass

    - id: refactor
      name: "TDD Refactor — Clean Up"
      steps:
        - Remove duplication
        - Extract helper functions for complex logic
        - Improve error messages
        - Add JSDoc/documentation
        - Run full quality gate to verify no regressions

  feedback_loop:
    max_iterations: 5
    gates:
      - name: compile
        command:
          typescript: "npx tsc --noEmit"
          go: "go build ./..."
          rust: "cargo check"
        timeout_ms: 10000
        on_fail: |
          Parse compiler errors. Focus on:
            - Type mismatches (check port interface)
            - Missing imports (add from core/ports)
            - Syntax errors (fix directly)

      - name: lint
        command:
          typescript: "npx eslint src/adapters/{{adapter}}/ --ext .ts --format json"
          go: "golangci-lint run --out-format json ./src/adapters/{{adapter}}/..."
          rust: "cargo clippy -p {{adapter_name}} --message-format json -- -D warnings"
        timeout_ms: 10000
        on_fail: |
          Parse lint errors as structured JSON. Apply auto-fixable rules first.
          For non-auto-fixable: apply targeted Edit to the specific line.

      - name: test
        command:
          typescript: "npx vitest run tests/unit/{{adapter_name}}.test.ts --reporter json"
          go: "go test -json ./tests/unit/{{adapter_name}}_test.go"
          rust: "cargo test --lib {{adapter_name}} -- --format json"
        timeout_ms: 30000
        on_fail: |
          Parse test failure output. For each failing test:
            1. Read the test assertion
            2. Read the actual vs expected
            3. Determine if it's a code bug or test bug
            4. Apply targeted fix

    on_max_iterations:
      action: escalate
      message: >
        Adapter {{adapter}} failed after {{max_iterations}} feedback loop iterations.
        Last gate: {{last_failed_gate}}. Errors: {{last_errors}}.
        Requesting human review or architecture guidance.

  commit:
    when: all_gates_pass
    message_template: "feat({{adapter_name}}): implement {{port}} adapter"
    include:
      - "src/adapters/{{adapter}}/**"
      - "tests/unit/{{adapter_name}}*"

quality_thresholds:
  test_coverage: 80
  max_lint_warnings: 5
  max_file_lines: 500
  max_function_lines: 50
  max_cyclomatic_complexity: 10
