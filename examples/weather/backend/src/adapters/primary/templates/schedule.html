{{define "schedule.html"}}
<div class="space-y-6">

    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-black flex items-center gap-3">
            <span class="w-1.5 h-8 bg-f1-red rounded-full inline-block"></span>
            {{.Season}} Season Schedule
        </h1>
        <span class="text-sm text-gray-400">{{len .Races}} races</span>
    </div>

    <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden">
        <table class="w-full">
            <thead>
                <tr class="border-b border-gray-700 text-left text-sm font-semibold text-f1-red uppercase tracking-wider">
                    <th class="px-6 py-4 w-16">Rnd</th>
                    <th class="px-6 py-4">Race</th>
                    <th class="px-6 py-4 hidden md:table-cell">Circuit</th>
                    <th class="px-6 py-4 hidden sm:table-cell">Location</th>
                    <th class="px-6 py-4 text-right">Date</th>
                </tr>
            </thead>
            <tbody>
                {{range .Races}}
                <tr class="border-b border-gray-700/50 transition-colors
                           {{if isPast .Date}}text-gray-500 hover:bg-gray-700/20{{else}}hover:bg-gray-700/30{{end}}
                           cursor-pointer"
                    hx-get="/results/{{.Season}}/{{.Round}}"
                    hx-target="#content"
                    hx-push-url="true">
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg
                                     {{if isPast .Date}}bg-gray-700 text-gray-400{{else}}bg-f1-red/10 text-f1-red{{end}}
                                     text-sm font-bold">
                            {{.Round}}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-semibold {{if not (isPast .Date)}}text-white{{end}}">{{.RaceName}}</div>
                    </td>
                    <td class="px-6 py-4 hidden md:table-cell text-sm">{{.Circuit.Name}}</td>
                    <td class="px-6 py-4 hidden sm:table-cell text-sm">
                        {{.Circuit.Location.Locality}}, {{.Circuit.Location.Country}}
                    </td>
                    <td class="px-6 py-4 text-right text-sm font-mono">
                        {{formatDate .Date}}
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>

</div>
{{end}}
