{{define "layout.html"}}<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — hex-f1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'f1-red': '#E10600',
                        'f1-red-dark': '#B30500',
                    }
                }
            }
        }
    </script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-request.htmx-indicator { display: inline-flex; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="h-full bg-gray-900 text-white" hx-boost="true">

    <!-- Navigation -->
    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-3" hx-get="/" hx-target="#content" hx-push-url="true">
                    <div class="w-8 h-8 bg-f1-red rounded flex items-center justify-center font-black text-sm">F1</div>
                    <span class="text-xl font-bold tracking-tight">Race Stats</span>
                </a>

                <!-- Nav Links -->
                <div class="flex items-center gap-1">
                    <a href="/"
                       hx-get="/" hx-target="#content" hx-push-url="true"
                       class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-colors">
                        Home
                    </a>
                    <a href="/schedule"
                       hx-get="/schedule" hx-target="#content" hx-push-url="true"
                       class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-colors">
                        Schedule
                    </a>
                    <a href="/drivers"
                       hx-get="/drivers" hx-target="#content" hx-push-url="true"
                       class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-colors">
                        Drivers
                    </a>
                    <a href="/constructors"
                       hx-get="/constructors" hx-target="#content" hx-push-url="true"
                       class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800 transition-colors">
                        Constructors
                    </a>
                </div>

                <!-- Loading Indicator -->
                <div class="htmx-indicator" id="global-indicator">
                    <svg class="spinner w-5 h-5 text-f1-red" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="content" hx-indicator="#global-indicator">
            {{.Content}}
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between text-sm text-gray-500">
                <span>Powered by <a href="https://github.com/jolpica/jolpica-f1" class="text-f1-red hover:underline" target="_blank" rel="noopener">Jolpica F1 API</a></span>
                <span>Built with hexagonal architecture</span>
            </div>
        </div>
    </footer>

</body>
</html>{{end}}
