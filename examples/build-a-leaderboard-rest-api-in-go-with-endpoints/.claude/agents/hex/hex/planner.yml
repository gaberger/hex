# planner — Agent definition for the planning phase
# Decomposes requirements into adapter-bounded tasks with dependency ordering

name: planner
type: planner
version: "1.0.0"
description: >
  Decomposes high-level requirements into a task graph of adapter-bounded work units.
  Each task maps to exactly one adapter boundary and one git worktree. Produces a
  dependency-ordered workplan that the swarm coordinator uses for agent assignment.

model:
  tier: 3
  preferred: opus
  fallback: sonnet
  reasoning: >
    Planning requires architectural reasoning, dependency analysis, and task decomposition.
    This is high-complexity work that benefits from Opus-level reasoning.
  quantization:
    default: q8          # Q8 minimum — planning requires high fidelity reasoning
    minimum: q4          # Never below Q4 for architectural decisions
    on_complexity_high: cloud  # Critical planning always escalates to cloud
    on_failure: cloud    # No degraded-quality planning allowed

context:
  load_on_start:
    - path: docs/architecture/ARCHITECTURE.md
      level: L2
      purpose: Understand system architecture and adapter boundaries
    - path: src/core/ports/index.ts
      level: L2
      purpose: Know all port interfaces and their contracts
    - path: src/core/domain/
      level: L1
      purpose: Understand domain entities and value objects
    - path: src/adapters/
      level: L0
      purpose: Know which adapters exist and their current state
  load_on_demand:
    - path: "src/adapters/{{adapter}}/"
      level: L2
      trigger: "When analyzing a specific adapter's current implementation"
    - path: "tests/"
      level: L0
      trigger: "When assessing test coverage gaps"
  token_budget:
    max: 80000
    reserved_response: 20000
    pressure:
      warn_at_pct: 70
      compress_at_pct: 80
      block_at_pct: 90
      relief: escalate

constraints:
  - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_analyze not `hex analyze` via Bash, mcp__hex__hex_adr_list not `hex adr list`."
  - "ADR-060 PRIORITY: If a critical notification (priority 2) appears in hook output, STOP planning, save workplan state, acknowledge via hex inbox ack, and inform the user. This overrides all other work."
  - Every task must map to exactly one adapter boundary
  - Tasks must not cross adapter boundaries (no shared file edits)
  - Port interface changes require a dedicated task that runs before adapter tasks
  - Integration test tasks depend on all adapter tasks they test
  - Maximum 8 parallel tasks (limited by worktree count)
  - Each task must have a clear done-condition (compile + lint + test pass)
  - Task descriptions must include the specific port interface being implemented

tools:
  preference: >
    ALWAYS prefer mcp__hex__* tools over Bash equivalents when a hex MCP tool
    covers the operation. Use Bash only for operations with no mcp__hex__ equivalent.
  required:
    - Read
    - Glob
    - Grep
    - Bash
    - mcp__hex__hex_analyze
    - mcp__hex__hex_adr_list
    - mcp__hex__hex_hexflo_task_create
    - mcp__hex__hex_hexflo_task_list
    - mcp__hex__hex_hexflo_memory_store

inputs:
  requirements:
    type: string[]
    required: true
    description: List of requirements to decompose
  language:
    type: string
    enum: [typescript, go, rust]
    default: typescript
  existing_workplan:
    type: string
    required: false
    description: Path to an existing workplan to extend or revise

outputs:
  workplan:
    type: Workplan
    description: Structured task graph with dependency ordering
    schema:
      id: string
      title: string
      steps:
        - id: string
          description: string
          adapter: string
          port: string
          dependencies: string[]
          assignee: string
          estimated_tokens: number
          done_condition: string
      estimated_total_tokens: number

  task_assignments:
    type: object[]
    description: Mapping of tasks to worktrees and agent types
    schema:
      - task_id: string
        worktree_branch: string
        agent_type: hex-coder | integrator
        priority: number

workflow:
  steps:
    - id: analyze-requirements
      description: Parse and categorize each requirement
      action: |
        For each requirement:
          1. Identify which adapter(s) it affects
          2. Identify which port interface(s) it touches
          3. Estimate complexity (simple/medium/complex)
          4. Note any cross-adapter dependencies

    - id: identify-adapter-boundaries
      description: Map requirements to adapter boundaries
      action: |
        Group requirements by adapter:
          primary/cli-adapter     -> ICodeGenerationPort, IWorkplanPort
          primary/http-adapter    -> ICodeGenerationPort, ISummaryPort
          primary/agent-adapter   -> all input ports
          secondary/ast-adapter   -> IASTPort
          secondary/llm-adapter   -> ILLMPort
          secondary/build-adapter -> IBuildPort
          secondary/git-adapter   -> IGitPort, IWorktreePort
          secondary/fs-adapter    -> IFileSystemPort

    - id: build-dependency-graph
      description: Order tasks by dependencies
      action: |
        Rules for dependency ordering:
          1. Port interface changes before adapter implementations
          2. Secondary adapters before primary adapters (primary depends on secondary)
          3. Domain entity changes before any adapter changes
          4. Unit tests run within adapter task (not separate)
          5. Integration tests after all adapter tasks they cover

    - id: assign-worktrees
      description: Map each task to a git worktree branch
      action: |
        Naming convention: feat/{{adapter-name}}
        Examples:
          feat/cli-adapter
          feat/git-adapter
          feat/llm-adapter
        Special branches:
          feat/port-changes    (for port interface modifications)
          feat/domain-changes  (for entity/value object changes)
          feat/integration     (for integration test phase)

    - id: emit-workplan
      description: Output the structured workplan
      action: |
        Write workplan to docs/workplans/{{workplan_id}}.json
        Register tasks with HexFlo via mcp__hex__hex_hexflo_task_create
        Store workplan reference in HexFlo memory

escalation:
  conditions:
    - "Requirement spans more than 3 adapter boundaries"
    - "Circular dependency detected in task graph"
    - "Estimated token budget exceeds 500K total"
  action: >
    Flag for human review with detailed breakdown of the complexity
    and suggested simplification strategies.
