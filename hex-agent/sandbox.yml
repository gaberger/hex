# hex-agent Docker AI Sandbox — network policy (ADR-2603282000)
#
# Defines the allowed network egress for hex-agent running inside a
# Docker AI Sandbox microVM. Outbound connections are restricted to
# the listed hosts; all other egress is dropped.
#
# Linux host note: Docker Desktop uses host.docker.internal; on Linux
# the nexus injects SPACETIMEDB_HOST and HEX_NEXUS_HOST env vars with
# the actual bridge IP (typically 172.17.0.1).

name: hex-agent-sandbox
image: hex-agent:latest

network:
  # Allow-list — minimal set needed for agent operation
  #
  # For remote dispatch (P5.2), SPACETIMEDB_HOST / SPACETIMEDB_PORT and
  # HEX_NEXUS_HOST / HEX_NEXUS_PORT point to the central SpacetimeDB and
  # nexus instances running on the coordinator machine.  When running
  # locally the defaults resolve to host.docker.internal (Docker Desktop)
  # or the bridge IP injected by hex-nexus on Linux.
  allow:
    # SpacetimeDB WebSocket (coordination + inference relay)
    - host: ${SPACETIMEDB_HOST:-host.docker.internal}
      port: ${SPACETIMEDB_PORT:-3033}
      protocol: tcp
      comment: SpacetimeDB WebSocket

    # hex-nexus REST API (task polling, file writes, compile-check)
    - host: ${HEX_NEXUS_HOST:-host.docker.internal}
      port: ${HEX_NEXUS_PORT:-5555}
      protocol: tcp
      comment: hex-nexus REST API

    # Local Ollama inference (optional — only if HEX_MODEL_TIER=local)
    # Always local to the Docker host, not configurable for remote dispatch.
    - host: host.docker.internal
      port: 11434
      protocol: tcp
      comment: Ollama local inference

    # OpenRouter inference API
    - host: openrouter.ai
      port: 443
      protocol: tcp
      comment: OpenRouter inference

    # Rust package registry (cargo fetch during code-gen tasks)
    - host: crates.io
      port: 443
      protocol: tcp
      comment: Rust crate registry
    - host: static.crates.io
      port: 443
      protocol: tcp
      comment: Rust crate CDN

    # Node package registry (npm tasks)
    - host: registry.npmjs.com
      port: 443
      protocol: tcp
      comment: npm registry

environment:
  # Injected by hex-nexus when spawning the container
  required:
    - SPACETIMEDB_TOKEN
    - HEX_NEXUS_URL
    - HEX_AGENT_ID
    - HEXFLO_TASK
  optional:
    - SPACETIMEDB_URL      # override default ws://host.docker.internal:3033
    - HEX_NEXUS_HOST       # Linux bridge IP override
    - SPACETIMEDB_HOST     # Linux bridge IP override
    - HEX_MODEL_TIER       # local|cloud (default: cloud)
    - OPENROUTER_API_KEY   # required when HEX_MODEL_TIER=cloud

mounts:
  # Worktree bind-mount: nexus provides the host path
  - type: bind
    source: "${WORKTREE_PATH}"
    target: /workspace
    comment: "git worktree for this task (hex-coder writes here)"

resources:
  memory: 2g
  cpus: "2.0"
