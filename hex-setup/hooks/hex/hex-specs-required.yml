# hex-specs-required — Pre-worktree hook enforcing specs-first development
# Blocks worktree creation if behavioral specs don't exist for the feature

name: hex-specs-required
type: pre-worktree
description: >
  Enforces the specs-first development pipeline. Before any feature worktrees
  can be created, behavioral specs must exist in docs/specs/<feature>.json.
  This prevents the "tests mirror bugs" problem where the same LLM writes
  both code and tests, encoding its misunderstandings into both.

trigger: pre-worktree-setup
blocking: true  # Worktree creation is blocked until specs exist

checks:
  specs_exist:
    description: "Behavioral specs file must exist for the feature"
    action: |
      Extract feature name from the worktree branch:
        feat/<feature-name>/<adapter> → feature-name

      Check for specs file:
        docs/specs/<feature-name>.json

      If file does not exist:
        BLOCK with message:
          "Behavioral specs required before worktree creation.
           Run /hex-feature-dev Phase 2 or create specs manually at:
           docs/specs/<feature-name>.json"

  specs_valid:
    description: "Specs must conform to the behavioral spec schema"
    action: |
      Parse the JSON file and validate:
        1. Must be a JSON array with at least 3 entries
        2. Each entry must have: category, description, given, when, then
        3. At least 1 entry must have negative_spec: true
        4. No duplicate descriptions

      Schema per entry:
        {
          "category": "string (e.g., 'happy-path', 'error', 'edge-case')",
          "description": "human-readable description of the behavior",
          "given": "precondition state",
          "when": "action or event",
          "then": "expected outcome or assertion",
          "negative_spec": false,
          "domain_conventions": {}
        }

  specs_coverage:
    description: "Specs should cover the layers affected by the feature"
    action: |
      If a workplan exists at docs/workplans/feat-<feature>.json:
        1. Read the workplan steps
        2. For each adapter boundary in the workplan, check that at least
           one behavioral spec covers behavior touching that adapter
        3. WARN (non-blocking) if any adapter boundary has zero spec coverage

bypass:
  flag: "--skip-specs"
  warning: >
    Specs enforcement bypassed with --skip-specs.
    This should only be used for emergency hotfixes.
    A follow-up task to write specs should be created immediately.
  action_on_bypass: |
    Log bypass event to HexFlo memory:
      key: "bypass/specs-required/<feature-name>"
      value: { bypassed_at: ISO timestamp, reason: "hotfix" }

output:
  on_pass: "Behavioral specs validated — {{spec_count}} specs covering {{category_count}} categories"
  on_fail: |
    BLOCKED: Behavioral specs required before worktree creation.

    Missing: docs/specs/{{feature-name}}.json

    To create specs:
      1. Run /hex-feature-dev and complete Phase 2 (Behavioral Specs)
      2. Or manually create the file with at least 3 Given/When/Then entries

    To bypass (emergency hotfixes only):
      ./scripts/feature-workflow.sh setup {{feature-name}} --skip-specs
