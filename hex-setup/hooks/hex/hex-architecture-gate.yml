# hex-architecture-gate — Post-build hook for architecture health validation
# Runs tree-sitter analysis and dead code detection after builds

name: hex-architecture-gate
type: post-build
description: >
  Validates architecture health after cargo build or bun run build completes.
  Runs tree-sitter boundary analysis, dead code detection, and port contract
  verification. Produces an architecture health score. Blocks deployment if
  score drops below threshold.

trigger: post-build
blocking: true  # Build is marked unhealthy if score < threshold

threshold:
  min_score: 80  # Architecture health score must be >= 80 to pass
  max_violations: 0  # Zero tolerance for boundary violations
  max_dead_exports: 5  # Allow up to 5 unused exports before flagging

checks:
  boundary_analysis:
    description: "Full tree-sitter boundary analysis of all source files"
    weight: 40
    action: |
      Run hex analyze on the entire source tree:
        hex analyze . --format json

      Parse the JSON output for:
        - boundary_violations: imports crossing hex layer boundaries
        - cycle_detections: circular dependency chains
        - orphan_adapters: adapters not wired in composition-root.ts
      Each violation reduces the score proportionally.

  dead_code_detection:
    description: "Find dead exports and unused port implementations"
    weight: 20
    action: |
      For each port interface in src/core/ports/:
        1. Find all methods declared in the port
        2. Grep for usages in usecases/ and adapters/
        3. Flag methods with zero usages as dead

      For each adapter in src/adapters/:
        1. Check if it's imported in composition-root.ts
        2. If not imported, flag as orphan adapter

  port_contract_compliance:
    description: "Verify adapters implement their port contracts completely"
    weight: 25
    action: |
      For each port interface:
        1. Extract method signatures (name, params, return type)
        2. Find all adapters that implement this port
        3. Verify each adapter implements ALL methods
        4. Check return type compatibility
      Flag partial implementations and type mismatches.

  error_type_compliance:
    description: "Domain and usecases must use typed errors, not raw Error()"
    weight: 15
    action: |
      Scan src/core/domain/ and src/core/usecases/ for:
        - new Error() — must use DomainError subclasses instead
        - throw "string" — must use typed errors
        - catch (e) { /* swallow */ } — must rethrow or wrap in DomainError

output:
  report:
    overall_score: "0-100 weighted score"
    boundary_violations: "list of {file, line, import, rule_violated}"
    dead_exports: "list of {port, method, last_used}"
    orphan_adapters: "list of adapter paths not wired"
    contract_gaps: "list of {port, adapter, missing_methods}"
    error_type_violations: "list of {file, line, raw_error_usage}"
  on_pass: "Architecture health: {{score}}/100 — all gates passed"
  on_fail: |
    Architecture health: {{score}}/100 — BELOW THRESHOLD ({{threshold}})
    {{violation_count}} boundary violations
    {{dead_count}} dead exports
    {{gap_count}} contract gaps
    Run `hex analyze . --verbose` for details.

integration:
  cli: "hex analyze . --post-build --threshold 80"
  ci: |
    # In CI pipelines, run as a blocking gate
    hex analyze . --format json --fail-on-violation
    if [ $? -ne 0 ]; then
      echo "Architecture gate FAILED — see hex analyze output"
      exit 1
    fi
