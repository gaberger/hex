# test-suite — Generate tests for existing code
# Used by: hex test generate <directory>

name: test-suite
version: "1.0.0"
description: >
  Generates comprehensive test suites for existing code. London-school
  unit tests, integration tests, and property tests. Validates they pass.

topology: pipeline

inference_defaults:
  provider: openrouter
  endpoint: /api/inference/complete
  fallback_chain: [openrouter/free]
  temperature: 0.3
  timeout_ms: 120000

agents:
  - role: hex-tester
    prompt: agent-tester.md
    cardinality: per_source_file
    inference:
      task_type: code_generation
      model: meta-llama/llama-4-maverick
      fallback: openrouter/free
      max_tokens: 4096
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"
        - "{{port_interface}}"
        - "{{test_patterns}}"           # London school, Deps pattern
        - "{{language}}"
    output:
      type: test_file
      write_to: "{{output_dir}}/tests/{{file_slug}}.test.ts"
    post_execute:
      - compile_check
      - run_tests

  - role: hex-fixer
    prompt: agent-fixer.md
    cardinality: per_issue
    triggered_by: [hex-tester]
    inference:
      task_type: code_edit
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
    context:
      token_budget: 30000
      includes:
        - "{{source_file}}"
        - "{{test_file}}"
        - "{{test_output}}"             # failure output for context
    output:
      type: source_file
      write_to: "{{source_file}}"

objectives:
  - id: TestsExist
    required: true
    evaluate: check_test_files_exist
  - id: TestsPass
    required: true
    depends_on: [TestsExist]
    evaluate:
      command: "bun test"
      alt_command: "cargo test"
  - id: CodeCompiles
    required: true
    evaluate:
      command: "npx tsc --noEmit"
      alt_command: "cargo check"

iteration:
  max_per_tier: 3
  on_max_iterations: report_and_continue
