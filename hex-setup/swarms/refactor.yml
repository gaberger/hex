# refactor — Architecture improvement swarm
# Used by: hex refactor <directory>

name: refactor
version: "1.0.0"
description: >
  Analyzes existing code for architecture violations, reviews for quality
  issues, fixes them, and re-validates. Iterates until Grade A.

topology: pipeline

inference_defaults:
  provider: openrouter
  endpoint: /api/inference/complete
  fallback_chain: [openrouter/free]
  temperature: 0.2
  timeout_ms: 120000

agents:
  - role: hex-analyzer
    prompt: null
    cardinality: once
    inference: null
    execute:
      command: "hex analyze {{output_dir}} --json"
      timeout_ms: 30000

  - role: hex-reviewer
    prompt: agent-reviewer.md
    cardinality: per_source_file
    depends_on: [hex-analyzer]
    inference:
      task_type: reasoning
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"
        - "{{port_interface}}"
        - "{{architecture_rules}}"
        - "{{analyze_violations}}"      # violations from analyzer
    output:
      type: structured_json
      schema: ReviewResult

  - role: hex-fixer
    prompt: agent-fixer.md
    cardinality: per_issue
    triggered_by: [hex-analyzer, hex-reviewer]
    inference:
      task_type: code_edit
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
      upgrade:
        after_iterations: 3
        to: openrouter/auto
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"
        - "{{issue_description}}"
        - "{{upstream_output}}"
        - "{{architecture_rules}}"
    output:
      type: source_file
      write_to: "{{source_file}}"

objectives:
  - id: ArchitectureGradeA
    required: true
    threshold:
      score: 90
      violations: 0
  - id: ReviewPasses
    required: true
  - id: CodeCompiles
    required: true
    evaluate:
      command: "npx tsc --noEmit"
      alt_command: "cargo check"

iteration:
  max_per_tier: 5
  on_max_iterations: report_and_continue
