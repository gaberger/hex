\* Current-daemon (buggy) configuration for P0.2.
\*
\* Models the shipped Rust daemon: DispatchVacuous transitions are
\* reachable (executor response "Object {}" accepted as in_progress),
\* and TimeoutSweep has NO weak-fairness guarantee (daemon has no
\* stale-task sweeper). Expect TLC to report a liveness violation
\* on TerminalReachable with a task stuck in_progress.
\*
\* HandleInvariant is also violated by DispatchVacuous but is left
\* OUT of INVARIANTS here so TLC explores the liveness counterexample
\* rather than halting on the earlier safety violation. Safety of
\* HandleInvariant is checked separately against SpecFixed in
\* sched_daemon_fixed.cfg.
SPECIFICATION SpecBuggy
CONSTANTS
    Tasks = {t1}
    TimeoutTicks = 2
    GraceTicks = 1
INVARIANTS
    TypeOK
PROPERTIES
    TerminalReachable
CHECK_DEADLOCK
    FALSE
