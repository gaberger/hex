\* Fixed-daemon configuration: EvidenceRequired added as an invariant —
\* this forbids DispatchVacuous transitions (since they would produce
\* in_progress with evidence=FALSE). Under this config, all safety AND
\* liveness properties should hold.
SPECIFICATION SpecFixed
CONSTANTS
    Tasks = {t1}
    TimeoutTicks = 2
    GraceTicks = 1
INVARIANTS
    TypeOK
    HandleInvariant
    EvidenceRequired
PROPERTIES
    TerminalReachable
    BoundedTermination
CHECK_DEADLOCK
    FALSE
