\* TLC model-checking configuration for hexflo.tla
\* Run: java -jar tla2tools.jar -config hexflo.cfg hexflo.tla
\*
\* 2 agents, 2 tasks. MaxVersion must exceed 2*(MaxCrashes+1)*|Tasks|
\* to avoid artificial deadlocks from version ceiling.

CONSTANTS
    Agents = {a1, a2}
    Tasks = {t1, t2}
    MaxVersion = 10
    MaxCrashes = 2

SPECIFICATION Spec

INVARIANTS
    TypeOK
    NoDuplicateAssignment
    PendingHasNoAgent

PROPERTIES
    NoTaskLoss
    CrashRecovery
