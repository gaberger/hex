name: hex-analyze-arch
description: >
  Run full hexagonal architecture analysis: dead export detection,
  dependency direction validation, and circular dependency detection.

triggers:
  - "check architecture"
  - "find dead code"
  - "validate hex boundaries"
  - "architecture health"
  - "detect circular dependencies"

parameters:
  rootPath:
    type: string
    default: "src"
    description: "Root directory to analyze"
  excludePatterns:
    type: string
    default: "node_modules,dist,*.test.ts,*.spec.ts"
    description: "Comma-separated glob patterns to exclude"

steps:
  - name: collect
    action: "Glob all TypeScript files and extract L1 AST summaries"
    agent: dead-code-analyzer
  - name: dead-exports
    action: "Identify exported symbols not imported by any other file"
    agent: dead-code-analyzer
  - name: hex-boundaries
    action: "Classify each file into its hex layer and validate import directions"
    agent: dead-code-analyzer
  - name: circular-deps
    action: "Build dependency graph and detect circular import chains via DFS"
    agent: dead-code-analyzer
  - name: report
    action: "Compute health score and write structured analysis report"
    output: "docs/analysis/arch-report.md"
