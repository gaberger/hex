# hex-validate — Post-build semantic validation
# Usage: "validate app", "post-build check", "judge the build"

name: hex-validate
version: "1.0.0"
description: >
  Runs the post-build validation judge to catch semantic bugs that
  compile-lint-test pipelines miss. Produces a PASS/FAIL verdict
  with behavioral spec results, property test results, smoke test
  results, and sign convention audit.

triggers:
  - "validate app"
  - "post-build check"
  - "judge the build"
  - "semantic validation"
  - "run validation judge"

parameters:
  problem_statement:
    type: string
    required: true
    description: >
      Original user prompt describing what they want built.
      Used to derive behavioral specs and expected behavior.
  domain_path:
    type: string
    required: true
    description: "Path to generated domain code"
  test_path:
    type: string
    required: false
    description: "Path to generated test files (defaults to tests/)"
  output_dir:
    type: string
    required: false
    default: "docs/analysis"
    description: "Where to write the verdict report"
  fix_on_fail:
    type: boolean
    default: false
    description: "If true, automatically iterate on FAIL verdict"

context:
  load_strategy:
    - level: L2
      scope: "src/core/ports/validation.ts"
      description: Load validation port contract
    - level: L2
      scope: "{{domain_path}}/**"
      description: Load all generated domain code signatures
    - level: L1
      scope: "{{test_path}}/**"
      description: Load test file skeletons
  token_budget:
    max_tokens: 120000
    reserved_for_response: 30000

steps:
  - id: spawn-judge
    description: Run the validation-judge agent
    action: agent
    agent: validation-judge
    inputs:
      problem_statement: "{{problem_statement}}"
      domain_path: "{{domain_path}}"
      test_path: "{{test_path}}"

  - id: write-verdict
    description: Write verdict report to output directory
    depends_on: [spawn-judge]
    action: bash
    command: "mkdir -p {{output_dir}}"

  - id: output-verdict
    description: Write the full verdict as a markdown report
    depends_on: [write-verdict]
    action: file_write
    path: "{{output_dir}}/validation-verdict.md"
    content: "{{spawn-judge.outputs.verdict}}"

  - id: iterate-on-fail
    description: If verdict is FAIL and fix_on_fail is true, re-run code generation
    depends_on: [output-verdict]
    condition: "spawn-judge.outputs.verdict.passed == false && fix_on_fail == true"
    action: skill
    skill: hex-generate
    inputs:
      fix_instructions: "{{spawn-judge.outputs.verdict.fix_instructions}}"

output:
  summary: "Validation {{verdict.passed ? 'PASSED' : 'FAILED'}} — score {{verdict.overall_score}}/100"
  verdict_path: "{{output_dir}}/validation-verdict.md"
  passed: "{{spawn-judge.outputs.verdict.passed}}"
