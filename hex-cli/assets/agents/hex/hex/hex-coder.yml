# hex-coder — Agent definition for coding within one adapter boundary
# Implements port interfaces with TDD feedback loops
# Optimized: Q4 prefix sharing + flat instructions + context-first

name: hex-coder
type: coder
version: "1.1.0"
description: >
  Generates production code within a single hexagonal adapter boundary. Uses TDD
  (London school, mock-first) with a compile-lint-test feedback loop. Never crosses
  adapter boundaries. Operates in an isolated git worktree.

# ── Shared prefix (cached across all hex agents) ──────────────────────
shared_prefix:
  id: hex-agent-common-v1
  constraints:
    - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_analyze not `hex analyze` via Bash, mcp__hex__hex_adr_search not `hex adr search`."
    - "ADR-060 PRIORITY: If a critical notification (priority 2) appears in hook output, STOP current work, save state, acknowledge via hex inbox ack, and inform the coordinator. This overrides all other work."
    - "BOUNDARY RULE: Adapters must NEVER import other adapters. Only import from core/ports and core/domain."
    - "COMMIT RULE: Every agent prompt that writes code MUST end with explicit git add <files> && git commit."
  tools_preference: >
    ALWAYS prefer mcp__hex__* tools over Bash equivalents when a hex MCP tool
    covers the operation. Use Bash only for operations with no mcp__hex__ equivalent.

# ── Model routing (ADR-2604120202 tier config) ────────────────────────
model:
  tier: T2
  preferred: gpt-4o-mini        # → openai/gpt-4o-mini (capable, reliable)
  fallback: haiku               # → anthropic/claude-haiku-4-5 (fast paid fallback)
  upgrade_to: sonnet            # → anthropic/claude-sonnet-4-6 (after 3 failed iterations)
  upgrade_condition: >
    Upgrade to Sonnet when: feedback loop exceeds 3 iterations without resolution,
    or when the adapter requires complex algorithmic logic. Upgrade to Opus when
    the task involves cross-cutting architecture changes or security-sensitive code.
  timeout_secs: 180

# ── Context loading (FRONT-LOADED before instructions) ────────────────
context:
  load_strategy:
    - level: L1
      scope: "src/core/ports/**"
      purpose: Know all port contracts (lightweight overview)
    - level: L2
      scope: "src/core/ports/index.ts"
      purpose: Full signatures of port being implemented
    - level: L1
      scope: "src/core/domain/**"
      purpose: Domain entity shapes for type references
    - level: L2
      scope: "src/adapters/{{target_adapter}}/**"
      purpose: Existing adapter code to extend or modify
    - level: L3
      scope: "{{current_edit_file}}"
      purpose: Full source of the file being actively edited
      load: on_demand

  token_budget:
    max: 100000
    reserved_response: 20000
    allocation:
      port_interfaces: 5000
      domain_entities: 3000
      target_adapter: 15000
      error_context: 10000
      generation_space: 67000
    pressure:
      warn_at_pct: 70
      compress_at_pct: 80
      block_at_pct: 90
      relief: summarize_history

# ── Agent-specific constraints ────────────────────────────────────────
constraints:
  - Never import from other adapters (only from core/ports and core/domain)
  - Always implement the full port interface (no partial implementations)
  - Every public method must have unit tests
  - Files must not exceed 500 lines; split into modules if needed
  - Use dependency injection for all external dependencies
  - All errors must be domain-specific types (not generic Error)
  - Code must compile and lint clean before committing
  - Follow existing project naming conventions

# ── Tools ─────────────────────────────────────────────────────────────
tools:
  required:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep
    - mcp__hex__hex_analyze
    - mcp__hex__hex_status
  optional:
    - mcp__hex__hex_adr_list
    - mcp__hex__hex_adr_search
    - mcp__hex__hex_hexflo_task_create
    - mcp__hex__hex_hexflo_task_complete
    - mcp__hex__hex_hexflo_memory_store
  inbox:
    - mcp__hex__hex_inbox_query
    - mcp__hex__hex_inbox_ack

# ── Inputs / Outputs ─────────────────────────────────────────────────
inputs:
  task:
    type: WorkplanStep
    required: true
    description: The specific task from the workplan to implement
  adapter:
    type: string
    required: true
    description: Adapter path (e.g. "secondary/git-adapter")
  port:
    type: string
    required: true
    description: Port interface to implement (e.g. "IGitPort")
  worktree:
    type: WorktreePath
    required: true
    description: Git worktree this agent operates in
  language:
    type: string
    enum: [typescript, go, rust]
    default: typescript

outputs:
  code_units:
    type: CodeUnit[]
    description: All files created or modified
  test_results:
    type: TestResult
    description: Final test run results
  quality_report:
    type: object
    schema:
      compile: boolean
      lint_errors: number
      lint_warnings: number
      tests_passed: number
      tests_failed: number
      iterations: number
      files_changed: string[]

# ── Workflow (flat numbered steps per phase) ──────────────────────────
workflow:
  phases:
    - id: pre_validate
      name: "Phase 1 — Validate Boundaries"
      steps:
        - "1. Classify target file layer using classifyLayer(filePath)"
        - "2. Call allowedImportsFor(filePath) to get permitted import targets"
        - "3. List all planned imports for the file being generated"
        - "4. Call validatePlannedImports(filePath, plannedImports)"
        - "5. If violations found — STOP. Fix imports before proceeding"
        - "6. If warnings found — log them, proceed with caution"
      gate:
        name: boundary_check
        blocking: true
        on_fail: |
          Planned imports violate hex boundary rules. Fix before writing code:
          1. Check which layers this adapter may import from (allowedImportsFor)
          2. Replace forbidden imports with port-based alternatives
          3. If domain types are needed, import via ports/ re-exports
          4. Re-run boundary check before proceeding

    - id: red
      name: "Phase 2 — TDD Red (Write Failing Tests)"
      steps:
        - "1. Read port interface at L2 for method contracts"
        - "2. Generate comprehensive unit test file"
        - "3. Cover: happy path, error cases, edge cases, async behavior"
        - "4. Run tests to verify they fail"
        - "5. If tests pass without implementation — tests are trivial, rewrite"

    - id: green
      name: "Phase 3 — TDD Green (Minimal Implementation)"
      steps:
        - "1. Implement adapter class with constructor (dependency injection)"
        - "2. Implement each port method with minimal passing logic"
        - "3. Run tests after each method implementation"
        - "4. Stop as soon as all tests pass"

    - id: refactor
      name: "Phase 4 — TDD Refactor"
      steps:
        - "1. Remove duplication"
        - "2. Extract helper functions for complex logic"
        - "3. Improve error messages"
        - "4. Add JSDoc/documentation"
        - "5. Run full quality gate to verify no regressions"

    - id: test_coverage_gate
      name: "Phase 5 — Test Type Gate"
      steps:
        - "1. Verify unit tests exist for all public methods"
        - "2. Verify at least one integration test if adapter has external deps"
        - "3. Verify at least one property test for domain functions (fast-check)"
        - "4. Verify error path tests exist (not just happy path)"
      gate:
        name: test_types
        blocking: true
        required_categories:
          - unit
          - error_paths
          - integration
        recommended_categories:
          - property
        on_fail: |
          Missing required test categories. Before committing:
          1. Add missing test types (see required_categories above)
          2. For property tests, use fast-check: fc.assert(fc.property(...))
          3. For integration tests, test with real adapter dependencies
          4. Re-run test suite to verify all categories pass

  feedback_loop:
    max_iterations: 5
    gates:
      - name: compile
        command:
          typescript: "npx tsc --noEmit"
          go: "go build ./..."
          rust: "cargo check"
        timeout_ms: 10000
        on_fail: |
          Parse compiler errors. Focus on:
          1. Type mismatches (check port interface)
          2. Missing imports (add from core/ports)
          3. Syntax errors (fix directly)

      - name: lint
        command:
          typescript: "npx eslint src/adapters/{{adapter}}/ --ext .ts --format json"
          go: "go vet ./..."
          rust: "cargo clippy -p {{adapter_name}} --message-format json -- -D warnings"
        timeout_ms: 10000
        on_fail: |
          Parse lint errors as structured JSON. Apply auto-fixable rules first.
          For non-auto-fixable: apply targeted Edit to the specific line.

      - name: test
        command:
          typescript: "npx vitest run tests/unit/{{adapter_name}}.test.ts --reporter json"
          go: "go test -json ./..."
          rust: "cargo test --lib {{adapter_name}} -- --format json"
        timeout_ms: 30000
        on_fail: |
          Parse test failure output. For each failing test:
          1. Read the test assertion
          2. Read the actual vs expected
          3. Determine if it's a code bug or test bug
          4. Apply targeted fix

    on_max_iterations:
      action: escalate
      message: >
        Adapter {{adapter}} failed after {{max_iterations}} feedback loop iterations.
        Last gate: {{last_failed_gate}}. Errors: {{last_errors}}.
        Requesting human review or architecture guidance.

  commit:
    when: all_gates_pass
    message_template: "feat({{adapter_name}}): implement {{port}} adapter"
    include:
      - "src/adapters/{{adapter}}/**"
      - "tests/unit/{{adapter_name}}*"

quality_thresholds:
  test_coverage: 80
  max_lint_warnings: 5
  max_file_lines: 500
  max_function_lines: 50
  max_cyclomatic_complexity: 10

# ── Prompt suffix (repeated key constraints — recency bias) ───────────
prompt_suffix:
  - "REMEMBER: Only edit files within your assigned adapter boundary."
  - "REMEMBER: Never import from other adapters — only core/ports and core/domain."
  - "REMEMBER: Commit your work with git add <files> && git commit when all gates pass."
  - "REMEMBER: Use mcp__hex__* tools, not Bash equivalents."
