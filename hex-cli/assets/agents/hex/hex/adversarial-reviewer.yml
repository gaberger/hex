# adversarial-reviewer — DEPRECATED: split into adversarial-red + adversarial-blue
#
# This file is kept as a stub so existing references (sched dispatch,
# README integrity check, swarm YAMLs that name it) don't break during
# the transition. Do NOT add behavior here.
#
# Replacement agents:
#   - adversarial-red.yml   — security/hex-boundary lens, provider_lock: anthropic
#   - adversarial-blue.yml  — correctness/UX lens,        provider_lock: openai_or_local
#   - validation-judge.yml  — accepts both reports, arbitrates via 6a_arbitrate_adversaries
#
# Why split: a single adversarial reviewer shares model blindspots with
# the coder. Two adversaries on different providers, with a judge that
# verifies provider divergence, catches issues neither would catch alone.
#
# Migration: any swarm YAML or dispatch code referencing
# `adversarial-reviewer` should be updated to invoke red + blue in
# parallel and route both reports to validation-judge.

name: adversarial-reviewer
type: deprecated
version: "2.0.0-deprecated"
description: >
  DEPRECATED. Split into adversarial-red.yml (security/boundary,
  Anthropic) and adversarial-blue.yml (correctness/UX, OpenAI/local).
  validation-judge.yml arbitrates the two reports.

deprecated:
  since: 2026-05-04
  superseded_by:
    - adversarial-red
    - adversarial-blue
  reason: >
    Single adversary shared model blindspots with the coder agent.
    Two adversaries on different providers + judge arbitration is
    the load-bearing pattern.
  migration: >
    Replace `adversarial-reviewer` with parallel invocation of
    `adversarial-red` and `adversarial-blue`, then pass both
    reports to `validation-judge` via its red_report + blue_report
    inputs. The judge's 6a_arbitrate_adversaries phase handles the rest.
