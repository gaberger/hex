name: scaffold-validator
type: reviewer
description: >
  Validates that every generated project is immediately runnable.
  Checks for README.md, start scripts, .env.example, and actually
  attempts to execute the dev/test commands. Runs AFTER code generation
  to ensure the "last mile" from code to running app is complete.

model_tier: 2  # Sonnet — validation, not creative reasoning

context:
  load:
    - package.json (scripts section)
    - README.md (if exists)
    - .env.example (if exists)
    - index.html (if exists — browser project)

inputs:
  project_root:
    type: string
    required: true
  language:
    type: string
    enum: [typescript, go, rust]

validation_phases:
  1_readme_exists:
    check: "README.md exists in project root"
    fix: "Generate via IScaffoldPort.generateReadme()"
    severity: CRITICAL

  2_readme_has_quickstart:
    check: "README.md contains a Quick Start section with runnable commands"
    fix: "Regenerate README with scaffold service"
    severity: HIGH

  3_start_scripts:
    check: "package.json (or Makefile/Taskfile) has dev, test, and build scripts"
    fix: "Generate via IScaffoldPort.generateScripts()"
    severity: CRITICAL

  4_dev_server_for_browser:
    check: "If project has .html files, a dev server script exists (vite, bun serve, etc.)"
    fix: "Add vite dependency and dev script"
    severity: CRITICAL

  5_env_example:
    check: "If any env vars are referenced, .env.example exists with descriptions"
    fix: "Generate via IScaffoldPort.generateEnvExample()"
    severity: HIGH

  6_actually_runs:
    check: "Execute 'install' then 'test' script — both must succeed"
    fix: "Debug and fix whatever blocks execution"
    severity: CRITICAL

  7_gitignore:
    check: ".gitignore exists and covers node_modules, dist, .env"
    fix: "Generate standard .gitignore for the language"
    severity: MEDIUM

constraints:
  - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_analyze, mcp__hex__hex_status instead of Bash."
  - Every project MUST have a README.md — no exceptions
  - README MUST contain exact commands to install, run, and test
  - If the project targets browser, a dev server is REQUIRED
  - .env files must NEVER be committed — only .env.example

tools:
  - file_read
  - file_write
  - file_glob
  - shell_exec  # for validation phase 6
