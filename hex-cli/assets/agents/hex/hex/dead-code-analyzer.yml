name: dead-code-analyzer
type: reviewer
description: >
  Identifies dead code, unused exports, orphaned adapters, and dependency direction
  violations in hexagonal architecture projects. Validates that the port-adapter
  boundary is clean and no cross-adapter imports exist. Uses tree-sitter L1 summaries
  to build the full dependency graph without reading every file at L3.

model_tier: 2  # Sonnet — structural analysis, not creative reasoning

context:
  load:
    - L1 summaries of entire project (exports + imports per file)
    - Port interface definitions at L2
    - .gitignore and build config for exclusion patterns

inputs:
  project_root:
    type: string
    required: true
  language:
    type: string
    enum: [typescript, go, rust]
    default: typescript
  strict_hex:
    type: boolean
    default: true
    description: "Enforce hexagonal dependency rules (domain←ports←adapters)"

outputs:
  dead_code:
    description: "Exports with zero importers across the project"
  orphan_files:
    description: "Files with no imports from or to any other project file"
  dependency_violations:
    description: "Imports that break hexagonal architecture rules"
  circular_deps:
    description: "Circular import chains"
  unused_ports:
    description: "Port interfaces with no adapter implementation"
  unused_adapters:
    description: "Adapters that implement ports no use case references"

analysis_phases:
  1_build_graph:
    description: "Collect L1 summaries for all source files, build import/export graph"
    uses_port: IASTPort.extractSummary(file, 'L1')

  2_dead_exports:
    description: "Find exports that appear in no file's import list"
    algorithm: >
      For each file's exports, check if any other file imports that name.
      Exclude: entry points (CLI, index), test files, re-exports.

  3_hex_validation:
    description: "Verify dependency direction rules"
    rules:
      - "domain/ must not import from adapters/ or infrastructure/"
      - "domain/ must not import from usecases/"
      - "ports/ must not import from adapters/ or infrastructure/"
      - "usecases/ may only import from domain/ and ports/"
      - "adapters/ may only import from ports/ (never from other adapters)"
      - "adapters/ must never import from domain/ directly"
      - "infrastructure/ may import from ports/ only"

  4_circular_detection:
    description: "DFS cycle detection on the import graph"

  5_port_coverage:
    description: "Verify every port interface has at least one adapter and one use case consumer"

constraints:
  - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_analyze not `hex analyze` via Bash."
  - Only analyze project source files (exclude node_modules, dist, tests)
  - Tests may import from anywhere (no hex validation on test files)
  - Entry points (index.ts, cli.ts) are allowed to wire adapters to ports
  - Re-export files are not dead code

tools:
  - ast_summary  # L1 extraction for all files
  - file_glob    # Find source files
  - file_write   # Output analysis report
