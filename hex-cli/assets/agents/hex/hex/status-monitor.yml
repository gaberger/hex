# status-monitor — Passive monitoring agent for swarm observability
# Subscribes to the event bus, formats status lines, detects anomalies

name: status-monitor
type: monitor
version: "1.0.0"
description: >
  A passive monitoring agent that subscribes to the domain event bus and
  provides real-time formatted progress updates. Detects anomalies such as
  stalls, quality regressions, and resource exhaustion. Runs alongside
  coding agents without interfering with their work.

model:
  tier: 2
  preferred: haiku
  fallback: haiku
  upgrade_to: sonnet
  upgrade_condition: >
    Upgrade to Sonnet when: anomaly detection requires deeper analysis of
    failure patterns, or when generating a decision request with multiple
    complex options.

context:
  load_strategy:
    - level: L1
      scope: "src/core/ports/notification.ts"
      purpose: Notification types and port interfaces
    - level: L1
      scope: "src/core/domain/entities.ts"
      purpose: Domain event types for event mapping
    - level: L2
      scope: "src/core/usecases/notification-orchestrator.ts"
      purpose: Orchestrator API for event handling and progress queries
    - level: L2
      scope: "src/core/usecases/status-formatter.ts"
      purpose: Formatting functions for status output

  token_budget:
    max: 20000
    reserved_response: 5000
    allocation:
      port_interfaces: 3000
      domain_events: 2000
      orchestrator_api: 3000
      formatter_api: 2000
      monitoring_space: 5000

constraints:
  - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_hexflo_swarm_status, mcp__hex__hex_hexflo_memory_retrieve instead of Bash."
  - "ADR-060 PRIORITY: If a critical notification (priority 2) appears in hook output, STOP monitoring, acknowledge via hex inbox ack, and relay the notification to the user. This overrides all other work."
  - Never modify source code or tests (read-only access to codebase)
  - Never interfere with other agents' git worktrees
  - Only emit notifications through the INotificationEmitPort interface
  - Respect rate limiting configured in NotificationOrchestrator
  - Keep monitoring overhead under 1% of total token budget
  - Never make decisions on behalf of the developer

tools:
  required:
    - Read
    - Glob
    - Grep
  optional:
    - mcp__hex__hex_hexflo_swarm_status
    - mcp__hex__hex_hexflo_swarm_status
    - mcp__hex__hex_hexflo_memory_retrieve

inputs:
  swarm_id:
    type: string
    required: true
    description: The swarm identifier to monitor
  output_level:
    type: string
    enum: [quiet, normal, verbose, debug]
    default: normal
    description: >
      Controls notification verbosity:
        quiet   — Only errors, decisions, and milestones
        normal  — Info and above, compact format, 5s progress interval
        verbose — Expanded dashboard format, 2s progress interval
        debug   — All levels including trace, 1s progress interval
  output_format:
    type: string
    enum: [ansi, plain, json]
    default: ansi
    description: Rendering mode for status output
  progress_interval_ms:
    type: number
    default: 5000
    description: Milliseconds between periodic progress emissions
  channels:
    type: string[]
    default: [terminal, event_bus]
    description: Notification channels to emit to

outputs:
  monitoring_summary:
    type: object
    description: End-of-run monitoring summary
    schema:
      total_notifications: number
      by_level:
        trace: number
        info: number
        success: number
        warning: number
        error: number
        decision: number
        milestone: number
      anomalies_detected: number
      stalls_detected: number
      decisions_requested: number
      total_duration_ms: number

workflow:
  phases:
    - id: init
      name: "Initialize Monitoring"
      steps:
        - Register with NotificationOrchestrator for the target swarm
        - Configure notification preferences based on output_level
        - Set up event bus subscription for all DomainEvent types
        - Emit initial milestone notification that monitoring has started

    - id: monitor
      name: "Continuous Monitoring Loop"
      steps:
        - Subscribe to domain events from the event bus channel
        - On each event, pass to NotificationOrchestrator.handleEvent()
        - Periodically call getProgress() and format via status-formatter
        - Emit formatted status lines to configured channels
        - "Anomaly checks: stall detection (>60s idle), quality regression, token budget >80%"
        - "On anomaly: escalate notification level, include suggested action"
        - "On decision needed: format decision request, emit to terminal channel, await response"

    - id: report
      name: "Final Summary"
      steps:
        - Generate monitoring summary with counts by notification level
        - Report total anomalies detected and resolutions
        - Report decisions requested and their outcomes
        - Emit final milestone notification with summary

  event_handling:
    domain_events:
      - event: CodeGenerated
        action: Forward to orchestrator, update agent step display
      - event: LintPassed
        action: Forward to orchestrator, show success indicator
      - event: LintFailed
        action: Forward to orchestrator, check iteration count for escalation
      - event: TestsPassed
        action: Forward to orchestrator, check if adapter milestone
      - event: TestsFailed
        action: Forward to orchestrator, check if repeated failure
      - event: BuildSucceeded
        action: Forward to orchestrator
      - event: BuildFailed
        action: Forward to orchestrator, emit error immediately
      - event: WorkplanCreated
        action: Forward to orchestrator, emit milestone
      - event: StepCompleted
        action: Forward to orchestrator, update progress totals
      - event: SwarmSpawned
        action: Forward to orchestrator, emit milestone

  anomaly_detection:
    stall:
      threshold_ms: 60000
      action: Emit warning notification with agent name and idle duration
      escalation: If stall persists >120s, emit error and suggest restart

    quality_regression:
      trigger: Quality score drops for 2+ consecutive iterations
      action: Emit warning, prepare decision request for developer
      options: [continue, escalate_model, reset_agent]

    resource_exhaustion:
      token_threshold_percent: 80
      action: Emit warning with current usage and remaining budget
      escalation: At 95%, emit error and suggest wrapping up

    iteration_limit:
      threshold_percent: 80
      action: Emit warning when agent reaches 80% of max iterations
      escalation: At max iterations, emit error with quality summary

  output_level_config:
    quiet:
      min_level: error
      progress_interval_ms: 30000
      format: compact
      show_trace: false
    normal:
      min_level: info
      progress_interval_ms: 5000
      format: compact
      show_trace: false
    verbose:
      min_level: info
      progress_interval_ms: 2000
      format: expanded
      show_trace: false
    debug:
      min_level: trace
      progress_interval_ms: 1000
      format: expanded
      show_trace: true

quality_thresholds:
  max_notification_rate: 10   # per second, across all levels
  max_decision_queue: 3       # pending decisions before pausing agents
  monitoring_token_budget: 500 # max tokens per monitoring cycle
