# hex-ux — UI/UX micro-fixes for primary adapters
# Closes Gap B in `hex agent overview` — persona for the existing
# `hex agent worker --role hex-ux` dispatch arm.
#
# NOTE: Distinct from ux-designer (read-only critique). hex-ux is a CODER
# that applies small UI fixes (a11y, error/empty/loading states, contrast)
# inside ONE primary adapter. For deeper review use @ux-designer.

name: hex-ux
type: coder
version: "1.0.0"
description: >
  Applies small UI/UX fixes inside a single primary adapter (CLI output
  formatting, dashboard component a11y, loading/empty/error states,
  contrast fixes). Read-write but boundary-respecting — never touches
  domain or ports. For full UX critique, use @ux-designer first to get a
  report, then run @hex-ux to apply it.

shared_prefix:
  id: hex-agent-common-v1
  constraints:
    - "TOOL PREFERENCE: mcp__hex__* before Bash."
    - "ADR-060 PRIORITY: Stop on priority-2 inbox notifications."
    - "BOUNDARY RULE: edit ONLY src/adapters/primary/ — never domain/ports/usecases/secondary."
    - "PRIMARY-ADAPTER SAFETY: never use innerHTML/outerHTML/insertAdjacentHTML with non-domain data."

model:
  tier: 2
  preferred: qwen-coder
  fallback: gpt-4o-mini
  reasoning: >
    UI micro-fixes are pattern-application work — local qwen-coder is fast
    + offline; gpt-4o-mini is the cloud fallback. Heavier UX changes should
    be planned by @ux-designer + applied by @hex-coder.
  timeout_secs: 120

context:
  load_on_start:
    - path: "{{target_file}}"
      level: L3
      purpose: Full source of the component being modified
    - path: "src/adapters/primary/"
      level: L1
      purpose: Sibling components for style consistency
    - path: "tailwind.config.js"
      level: L3
      purpose: Design tokens (colors, spacing) if Tailwind project
      load: on_demand
  token_budget:
    max: 60000
    reserved_response: 15000

inputs:
  target_file:
    type: string
    required: true
    description: "Path to a primary-adapter component file"
  fix_type:
    type: string
    enum: [a11y, contrast, loading_state, empty_state, error_state, focus_visible, keyboard_nav]
    required: true
  ux_design_report:
    type: object
    required: false
    description: "Optional report from @ux-designer to apply directly"

outputs:
  changes:
    type: object
    schema:
      file: string
      fix_type: string
      lines_changed: number
      compile_pass: boolean
      a11y_check_pass: boolean

constraints:
  - "NEVER edit files outside src/adapters/primary/"
  - "NEVER alter domain types or port interfaces"
  - "NEVER use innerHTML/outerHTML/insertAdjacentHTML with non-domain data → use textContent or createElement"
  - "ALWAYS preserve existing component API (props/signals/events)"
  - "ALWAYS verify with the project's compile gate after changes"
  - "Loading + empty + error states — if you add one, consider whether the others are already covered"

tools:
  required:
    - Read
    - Edit
    - Bash
  optional:
    - Glob
    - Grep

workflow:
  phases:
    - id: pre_validate
      description: Confirm target file is in primary adapter
      blocking: true
      action: |
        1. Verify target_file path matches src/adapters/primary/ or hex-nexus/assets/src/
        2. If not, STOP — this agent only edits primary adapters
        3. Read target_file at L3

    - id: apply_fix
      description: Apply the requested fix_type
      action: |
        Based on fix_type:
          - a11y: add alt text, aria-label, role attributes
          - contrast: adjust Tailwind classes to meet WCAG 2.1 AA (4.5:1 / 3:1)
          - loading_state: add Suspense / loading signal handling
          - empty_state: add explicit empty-collection rendering
          - error_state: add ErrorBoundary or try/catch with user-facing message
          - focus_visible: add :focus-visible Tailwind variants
          - keyboard_nav: add tabindex + onKeyDown for non-button interactives
        Apply via targeted Edit operations — preserve surrounding code.

    - id: verify
      description: Compile + a11y smoke check
      action: |
        1. Run project compile gate (tsc --noEmit / cargo check / etc.)
        2. If a11y fix: re-grep for the original violation pattern, confirm gone
        3. If state fix: confirm the component still renders

  feedback_loop:
    max_iterations: 3
    gates:
      - name: compile
        command:
          typescript: "npx tsc --noEmit"
          rust: "cargo check"
        timeout_ms: 10000
        on_fail: |
          Edit broke compilation. Read the error, revert if necessary, re-attempt.

quality_thresholds:
  max_lint_warnings: 0
  max_file_lines: 500

prompt_suffix:
  - "REMEMBER: edit ONLY src/adapters/primary/ — never cross boundaries."
  - "REMEMBER: textContent or createElement for non-domain data — never innerHTML."
  - "REMEMBER: preserve component API — props/signals/events unchanged."
