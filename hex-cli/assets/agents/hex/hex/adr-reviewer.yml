# adr-reviewer — Agent definition for Architecture Decision Record review
# Validates ADR structure, status transitions, cross-references, and compliance

name: adr-reviewer
type: reviewer
version: "1.0.0"
description: >
  Reviews Architecture Decision Records for completeness, structural validity,
  and cross-reference integrity. Validates status transitions (proposed → accepted
  → superseded → deprecated). Checks that code changes comply with accepted ADRs
  and flags when new ADRs should be written. Backs the /hex-adr-review skill.

model:
  tier: 2
  preferred: sonnet
  fallback: haiku
  reasoning: >
    ADR review requires understanding architectural intent and checking structural
    conventions, but does not require the deep reasoning of planning or validation.
    Sonnet is sufficient for template compliance and cross-reference checking.

context:
  load_on_start:
    - path: docs/adrs/
      level: L1
      purpose: Index all existing ADRs — titles, statuses, relationships
    - path: CLAUDE.md
      level: L1
      purpose: Understand hex architecture rules that ADRs must reference
  load_on_demand:
    - path: "docs/adrs/{{adr_id}}.md"
      level: L2
      trigger: "When reviewing a specific ADR in detail"
    - path: "src/"
      level: L0
      trigger: "When checking code compliance against an ADR"
  token_budget:
    max: 40000
    reserved_response: 10000

inputs:
  mode:
    type: string
    enum: [review-single, review-all, compliance-check, lifecycle-audit]
    required: true
    description: "What kind of ADR review to perform"
  adr_path:
    type: string
    required: false
    description: "Path to a specific ADR file (for review-single mode)"
  diff:
    type: string
    required: false
    description: "Git diff to check against ADRs (for compliance-check mode)"

outputs:
  review:
    type: ADRReview
    schema:
      adr_id: string
      status: "compliant | warning | violation | needs-adr"
      structural_issues: string[]
      missing_sections: string[]
      cross_reference_issues: string[]
      status_transition_issues: string[]
      recommendations: string[]

constraints:
  - "TOOL PREFERENCE: Always use mcp__hex__* MCP tools before falling back to Bash. e.g. use mcp__hex__hex_adr_list, mcp__hex__hex_adr_search, mcp__hex__hex_adr_status instead of Bash."
  - Every ADR must have: Title, Status, Context, Decision, Consequences sections
  - Status must be one of: proposed, accepted, deprecated, superseded
  - Superseded ADRs must link to their replacement via "Superseded by ADR-XXX"
  - Accepted ADRs that reference code patterns must be verifiable in the codebase
  - ADR numbering must be sequential with no gaps
  - ADRs must not contradict each other (cross-reference integrity)

tools:
  required:
    - Read
    - Glob
    - Grep
    - Bash
  optional:
    - mcp__hex__hex_adr_list
    - mcp__hex__hex_adr_search
    - mcp__hex__hex_adr_status

workflow:
  steps:
    - id: index-adrs
      description: Build an index of all ADRs with status and relationships
      action: |
        Read all files in docs/adrs/:
          1. Extract ADR number, title, status from each file
          2. Extract cross-references (mentions of other ADR-XXX)
          3. Build a relationship graph (supersedes, relates-to, extends)
          4. Check for numbering gaps or duplicates

    - id: validate-structure
      description: Check each ADR against the required template
      action: |
        Required sections (in order):
          - Title (# ADR-NNN: Title)
          - Status (proposed | accepted | deprecated | superseded)
          - Context (why this decision was needed)
          - Decision (what was decided)
          - Consequences (what follows from the decision)
        Optional sections:
          - Alternatives Considered
          - References
          - Superseded By / Supersedes

    - id: check-status-transitions
      description: Validate status lifecycle is consistent
      action: |
        Valid transitions:
          proposed → accepted
          proposed → deprecated (rejected before acceptance)
          accepted → deprecated
          accepted → superseded (must link to replacement)
        Invalid:
          superseded → accepted (cannot un-supersede)
          deprecated → accepted (write a new ADR instead)

    - id: check-cross-references
      description: Verify all ADR cross-references resolve
      action: |
        For each "ADR-XXX" reference in any ADR:
          1. Verify ADR-XXX exists
          2. Verify the relationship is bidirectional where expected
          3. Flag broken references (ADR deleted or renumbered)

    - id: compliance-check
      description: Check code changes against accepted ADRs
      action: |
        For each changed file in the diff:
          1. Identify which architectural layer it belongs to
          2. Find ADRs that govern that layer
          3. Check if the change complies with the decision
          4. Flag violations with the specific ADR and section

    - id: staleness-check
      description: Identify ADRs that may be stale or abandoned
      action: |
        Flag ADRs that are:
          - "proposed" for more than 30 days without acceptance
          - Referencing code patterns that no longer exist
          - Contradicted by recent accepted ADRs
          - Covering components that have been removed

    - id: emit-report
      description: Output the review report
      action: |
        For each ADR reviewed, output:
          - Status: compliant | warning | violation | needs-adr
          - Issues found (structural, cross-ref, lifecycle)
          - Recommendations for improvement
        Summary:
          - Total ADRs: N
          - Compliant: N
          - Warnings: N
          - Violations: N

escalation:
  conditions:
    - "ADR contradicts another accepted ADR"
    - "Code change violates an accepted ADR with no override justification"
    - "More than 5 ADRs in proposed status (decision backlog)"
  action: >
    Flag for human review with specific contradictions or violations
    and suggested resolution paths.
