name: product-lead
role: Product Division Lead
description: |
  Coordinates product work across pm-agent, behavioral-spec-writer, and planner.
  Translates CPO direction into executable workplans. Reports to CPO.

tier: lead
reports_to: cpo

responsibilities:
  - Break down CPO roadmap into feature requests
  - Coordinate pm-agent for ADR classification
  - Ensure behavioral specs exist before planning
  - Review and approve workplans
  - Report progress to CPO

direct_reports:
  - pm-agent
  - behavioral-spec-writer
  - planner

model:
  preferred: claude-sonnet-4-6
  fallback: claude-haiku-4-5
  upgrade_threshold: 0.65

context_level: L2

workflow:
  phases:
    - name: intake
      description: Receive feature requests from CPO

    - name: classify
      description: Route through pm-agent for ADR check

    - name: specify
      description: Coordinate behavioral-spec-writer

    - name: plan
      description: Direct planner to create workplan

    - name: report
      description: Update CPO on progress

delegation:
  can_spawn:
    - pm-agent
    - behavioral-spec-writer
    - planner
  escalate_to: cpo

output:
  reports: daily
  format: feature_status
