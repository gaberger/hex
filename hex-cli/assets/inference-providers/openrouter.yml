# OpenRouter — Multi-model broker with free tier (ADR-2604052125)
# 50 req/day free (1K with $10 lifetime spend). 28+ free models.
# Already integrated as primary broker — this template adds free-tier metadata.
name: openrouter
display_name: OpenRouter
base_url: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY
provider_type: openrouter
openai_compatible: true
is_free_tier: true
rate_limits:
  rpm: 20
  daily_requests: 50
  daily_tokens: null
  tpm: 50000
cost:
  input_per_mtok: 0.0
  output_per_mtok: 0.0
models:
  - id: deepseek/deepseek-r1:free
    tier: cloud
    context_window: 65536
    coding_optimized: true
    task_types: [reasoning, code_generation]
  - id: meta-llama/llama-3.3-70b-instruct:free
    tier: cloud
    context_window: 131072
    coding_optimized: false
    task_types: [general, reasoning]
  - id: mistralai/mistral-small-3.1-24b-instruct:free
    tier: cloud
    context_window: 32768
    coding_optimized: false
    task_types: [general]
  - id: qwen/qwen3-32b:free
    tier: cloud
    context_window: 32768
    coding_optimized: true
    task_types: [code_generation, reasoning]
routing:
  preferred_for: interactive
  workload_class: interactive
  priority: 4
