# Improver discovery rule table — ADR-2026-04-27-1100 P1.1
#
# Detectors-as-data per ADR-2026-04-14-2243 (rules-as-data, not control flow).
# One entry per `Source` variant in
# hex-cli/src/commands/sched/improver/discover.rs.
#
# Contract for each `cmd`:
#   - runs as a subprocess (sh -c) with cwd = repo root
#   - emits JSON on stdout
#   - either a top-level `findings` array, or a top-level array, or an
#     object addressable via `findings_pointer` (RFC 6901)
#   - each finding becomes a Hypothesis tagged with this entry's `source`
#   - non-zero exit codes are tolerated by default (diagnostic tools commonly
#     signal "findings present" via exit code); set `allow_nonzero_exit = false`
#     when zero-exit is a hard contract.
#
# Scope-field discovery is per-source — see `extract_scope` in discover.rs.

[[detector]]
source = "adr_doctor"
cmd = "hex adr doctor --json"
description = "ADR registry self-consistency (ADR-2026-04-27-0800)"

[[detector]]
source = "reconcile_strict"
cmd = "hex plan reconcile --all --strict --json"
description = "Workplan declared state diverging from git evidence (ADR-2026-04-14-2200)"

[[detector]]
source = "git_drift"
cmd = "hex worktree list --stale --json"
description = "Worktrees and branches out of sync with main"

[[detector]]
source = "inbox_stale"
cmd = "hex inbox list --stale --json"
description = "Inbox notifications past their P1/P2 SLA (ADR-060)"

[[detector]]
source = "adr_lifecycle"
cmd = "hex adr status --json"
description = "Stale Proposed / unlinked Superseded / abandoned ADRs (ADR-012)"

[[detector]]
source = "escalation_report"
cmd = "hex inference escalation-report --json"
description = "Tiers escalating repeatedly to the frontier (ADR-2026-04-12-0202)"

[[detector]]
source = "punch_list"
cmd = "hex insight punch-list --json"
description = "Self-acknowledged punch-list items in agent transcripts"

[[detector]]
source = "q_starvation"
cmd = "hex sched improver scores --starvation"
description = "Improver action templates that ran enough times (≥3 samples) to be statistically meaningful but produced non-positive mean reward — i.e. the action runs but doesn't resolve its target hypothesis. Indicates a broken (source, action_kind) mapping in act::derive that needs operator review."
allow_nonzero_exit = true

[[detector]]
source = "workplan_integrity"
cmd = "hex plan integrity --json"
description = "Workplan files with missing required structural fields (title, phase title, task id/title). Catches destructive action-quality issues — particularly aggressive `reconcile --update` that strips fields while clearing its target hypothesis. Reward attribution alone can't see this; the detector surfaces the corruption as a hypothesis so the brain can react."
allow_nonzero_exit = true

[[detector]]
source = "layer_coverage"
cmd = "hex plan layers --json"
description = "Canonical hexagonal-architecture layers missing in the current project (use cases, primary adapters, composition root). Surfaces structural gaps so target apps can be developed from skeleton to complete via improver-driven drafts."
allow_nonzero_exit = true

[[detector]]
source = "build_readiness"
cmd = "hex plan ready --json"
description = "Typecheck AND test-suite failures in the current project. Closes the gap between 'structural layers exist' and 'code in them actually works.' Tests are included so failing test runs (vitest/cargo test) surface as findings — a green typecheck with red tests is exactly the silent-failure mode this loop must catch. Cost: one `npm test` / `cargo test` per tick; if your test suite is too slow for every-tick polling, gate it via `cmd = ... --no-tests` and add a separate longer-period detector."
allow_nonzero_exit = true

[[detector]]
source = "test_coverage"
cmd = "hex plan tests --json"
description = "Source files lacking sibling test files (or test files with zero test cases). Drives a test-generation swarm: each finding becomes a draft for the tester agent to consume. Coverage gaps that operators wouldn't notice in a code review surface here."
allow_nonzero_exit = true

[[detector]]
source = "thought_pattern"
cmd = "hex sched improver thought-patterns --json"
description = "BS-5: cross-persona patterns in agent_thought — same ADR cited by ≥2 personas across ≥3 recent thoughts (likely unresolved architectural concern), or kind=frustration spikes (resource/methodology block). Closes the consumer side of Phase-2 thought memory. Pairs with the emitter in hex-nexus::orchestration::org_responder (commit 7671f7d3)."
allow_nonzero_exit = true

