# hex-merge-validation — Pre-merge hook for worktree integration gates
# Validates worktrees before merging into the main feature branch

name: hex-merge-validation
type: pre-merge
description: >
  Gates worktree merges to ensure each adapter implementation is complete
  and correct before integration. Validates that tests pass, commits follow
  conventions, TDD phases were completed, and the merge order respects
  the hexagonal dependency hierarchy.

trigger: pre-worktree-merge
blocking: true  # Merge is rejected if any gate fails

checks:
  merge_order:
    description: "Worktrees must merge in dependency order"
    priority: 1
    action: |
      Enforce merge order based on hexagonal layers:
        1. domain (no dependencies)
        2. ports (depends on domain)
        3. secondary adapters (depends on ports)
        4. primary adapters (depends on ports)
        5. usecases (depends on ports + domain)
        6. integration (depends on everything)

      Before merging feat/<feature>/<adapter>:
        Check that all lower-tier worktrees are already merged.
        If feat/<feature>/ports is not yet merged, block merging any adapter.

      Read the workplan at docs/workplans/feat-<feature>.json to determine
      the dependency graph and verify ordering.

  tests_pass:
    description: "All tests must pass in the worktree before merge"
    priority: 2
    action: |
      In the worktree being merged, run:
        bun run check   # TypeScript type check
        bun test         # Unit + property tests
        cargo test       # Rust tests (if applicable)

      All must exit 0. If any fail:
        BLOCK with test output showing failures.

  commit_convention:
    description: "Commits must follow the hex convention"
    priority: 3
    action: |
      Check all commits on the worktree branch (since divergence from main):
        git log main..HEAD --oneline

      Each commit message must match:
        <type>(<scope>): <description>

      Valid types: feat, fix, refactor, test, docs, chore
      Scope should match the adapter name or layer.

      Examples:
        feat(cli-adapter): implement IWorkplanPort
        test(git-adapter): add unit tests for worktree management
        fix(domain): correct sign convention in velocity calculation

  no_cross_adapter_imports:
    description: "Final check that no cross-adapter imports were introduced"
    priority: 4
    action: |
      Run the hex-boundary-check logic on the worktree diff:
        git diff main..HEAD -- src/adapters/

      Verify no adapter file imports from another adapter directory.
      This is defense-in-depth — catches violations that slipped past
      the pre-commit hook (e.g., if hook was bypassed).

  tdd_evidence:
    description: "Verify TDD was followed — tests should exist for new code"
    priority: 5
    action: |
      For each new source file in the worktree diff:
        1. Check if a corresponding test file exists
        2. Check if test file was committed BEFORE or in the SAME commit
           as the implementation (Red-Green-Refactor evidence)

      WARN (non-blocking) if:
        - New adapter code has no test file
        - Test file was added after implementation (suggests test-after, not TDD)

output:
  on_pass: |
    Merge gates passed for feat/{{feature}}/{{adapter}}:
      - Merge order: valid (tier {{tier}}, all dependencies merged)
      - Tests: all passing
      - Commits: {{commit_count}} commits, all conventional
      - Boundaries: no cross-adapter imports
      - TDD: evidence found
  on_fail: |
    BLOCKED: Merge gates failed for feat/{{feature}}/{{adapter}}

    Failed checks:
    {{#each failed_checks}}
      - {{name}}: {{reason}}
    {{/each}}

    Fix the issues above and retry the merge.
