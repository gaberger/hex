# dev-pipeline — Full development pipeline with all agent roles
# Used by: hex dev start "description" --auto
#
# Flow per tier:
#   hex-coder (parallel per step)
#   → hex-reviewer + hex-tester (parallel per file)
#   → hex-analyzer (per tier)
#   → hex-ux (if UI adapters)
#   → hex-fixer (if any failures)
#   → loop until all objectives met
#   → hex-documenter (final tier only)

name: dev-pipeline
version: "1.0.0"
description: >
  Complete AI development pipeline. Generates code, reviews for quality,
  writes tests, enforces hex architecture, checks UX, fixes issues, and
  generates documentation. Goal-driven objective loop per tier.

topology: hex-pipeline

# ── Inference Defaults ─────────────────────────────────────────────────
# Applied to all agents unless overridden per-agent.
# Maps to hex-nexus POST /api/inference/complete

inference_defaults:
  provider: openrouter
  endpoint: /api/inference/complete
  fallback_chain:
    - openrouter/free             # if primary fails (402/429)
  temperature: 0.3
  timeout_ms: 120000              # 2 min per call
  retry:
    max_attempts: 2
    backoff_ms: 5000              # paid models
    backoff_free_ms: 15000        # free models need longer

model_defaults:
  reasoning: deepseek/deepseek-r1
  code_generation: meta-llama/llama-4-maverick
  structured_output: meta-llama/llama-4-maverick
  code_edit: deepseek/deepseek-r1
  fallback: openrouter/free

# ── Agent Definitions ──────────────────────────────────────────────────
# Each agent: role, prompt, inference config, context loading, outputs

agents:
  - role: hex-coder
    description: Generates code within hex adapter boundaries
    definition: hex-coder.yml           # full agent behavior (workflow, feedback)
    prompt: agent-coder.md              # system prompt template
    cardinality: per_workplan_step
    tier_scope: current
    inference:
      task_type: code_generation
      model: meta-llama/llama-4-maverick
      fallback: openrouter/free
      max_tokens: 4096
      temperature: 0.3
    context:
      strategy: from_definition         # use L1/L2/L3 from agent YAML
      token_budget: 100000
      includes:
        - "{{workplan_step}}"           # step description + tier + adapter
        - "{{port_interfaces}}"         # port files for this step
        - "{{existing_code}}"           # other files in same tier
        - "{{architecture_rules}}"      # boundary rules for this tier
        - "{{language}}"                # typescript/rust
    output:
      type: source_file
      write_to: "{{output_dir}}/{{inferred_path}}"

  - role: hex-reviewer
    description: Reviews code for quality, patterns, and hex compliance
    prompt: agent-reviewer.md
    cardinality: per_source_file
    parallel_with: [hex-tester]
    depends_on: [hex-coder]
    inference:
      task_type: reasoning              # needs deep analysis
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
      temperature: 0.2                  # more deterministic for reviews
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"             # the file being reviewed
        - "{{port_interface}}"          # expected contract
        - "{{architecture_rules}}"
        - "{{review_checklist}}"        # severity levels, what to check
    output:
      type: structured_json
      schema: ReviewResult              # verdict, issues[]
      write_to: "{{output_dir}}/.hex-review/{{file_slug}}.json"

  - role: hex-tester
    description: Generates London-school tests with Deps pattern
    prompt: agent-tester.md
    cardinality: per_source_file
    parallel_with: [hex-reviewer]
    depends_on: [hex-coder]
    inference:
      task_type: code_generation
      model: meta-llama/llama-4-maverick
      fallback: openrouter/free
      max_tokens: 4096
      temperature: 0.3
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"             # code to test
        - "{{port_interface}}"          # contract = test spec
        - "{{test_patterns}}"           # London school, no mock.module()
        - "{{language}}"
    output:
      type: test_file
      write_to: "{{output_dir}}/tests/{{file_slug}}.test.ts"
    post_execute:
      - compile_check                   # verify test compiles
      - run_tests                       # verify tests pass

  - role: hex-analyzer
    description: Runs hex analyze for architecture compliance
    prompt: null                        # no LLM — runs hex analyze CLI
    cardinality: per_tier
    depends_on: [hex-coder]
    inference: null                     # no inference call
    execute:
      command: "hex analyze {{output_dir}}"
      parse: json
      timeout_ms: 30000
    output:
      type: analyze_result
      schema: AnalyzeResult             # score, grade, violations[]

  - role: hex-ux
    description: Reviews UX/accessibility for CLI, API, and frontend adapters
    prompt: agent-ux.md
    cardinality: per_tier
    depends_on: [hex-coder]
    when: has_primary_adapters
    inference:
      task_type: reasoning
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
      temperature: 0.2
    context:
      token_budget: 50000
      includes:
        - "{{adapter_files}}"           # primary adapter source files
        - "{{user_description}}"        # original feature request
        - "{{ux_checklist}}"            # CLI/API/frontend checks
    output:
      type: structured_json
      schema: UxReviewResult
      write_to: "{{output_dir}}/.hex-ux-review/review.json"

  - role: hex-fixer
    description: Fixes specific issues reported by other agents
    prompt: agent-fixer.md
    cardinality: per_issue
    triggered_by: [hex-reviewer, hex-tester, hex-analyzer, hex-ux]
    inference:
      task_type: code_edit              # reasoning for understanding issues
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 4096
      temperature: 0.2
      upgrade:
        after_iterations: 3
        to: openrouter/auto             # escalate to best model if stuck
    context:
      token_budget: 50000
      includes:
        - "{{source_file}}"             # file to fix
        - "{{issue_description}}"       # from upstream agent
        - "{{upstream_output}}"         # full output from reviewer/tester/analyzer
        - "{{port_interface}}"          # expected behavior
        - "{{architecture_rules}}"
    output:
      type: source_file
      write_to: "{{source_file}}"       # overwrite the broken file

  - role: hex-documenter
    description: Generates comprehensive documentation
    prompt: agent-documenter.md
    cardinality: per_swarm
    when: final_tier
    depends_on: [hex-coder, hex-reviewer, hex-tester, hex-analyzer]
    inference:
      task_type: reasoning              # needs to synthesize across all code
      model: deepseek/deepseek-r1
      fallback: openrouter/free
      max_tokens: 8192                  # longer output for full README
      temperature: 0.4                  # slightly creative for docs
    context:
      token_budget: 80000
      includes:
        - "{{adr_content}}"             # architecture decision
        - "{{all_source_files}}"        # all generated code
        - "{{workplan}}"                # step decomposition
        - "{{port_interfaces}}"         # public API surface
        - "{{language}}"
    output:
      type: documentation
      files:
        - "{{output_dir}}/README.md"
        - "{{output_dir}}/docs/API.md"

# ── Objectives ─────────────────────────────────────────────────────────
# Goal-driven loop: supervisor evaluates ALL after every agent action

objectives:
  - id: CodeGenerated
    required: true
    agent: hex-coder
    evaluate: check_source_files_exist

  - id: CodeCompiles
    required: true
    agent: hex-fixer
    depends_on: [CodeGenerated]
    evaluate:
      command: "npx tsc --noEmit"       # typescript
      alt_command: "cargo check"         # rust
      parse: error_count

  - id: TestsExist
    required: true
    agent: hex-tester
    depends_on: [CodeGenerated]
    evaluate: check_test_files_exist

  - id: TestsPass
    required: true
    agent: hex-fixer
    depends_on: [CodeCompiles, TestsExist]
    evaluate:
      command: "bun test"
      alt_command: "cargo test"
      parse: pass_fail_counts

  - id: ReviewPasses
    required: true
    agent: hex-reviewer
    depends_on: [CodeGenerated]
    evaluate: check_review_json_verdict

  - id: ArchitectureGradeA
    required: true
    agent: hex-analyzer
    depends_on: [CodeGenerated]
    evaluate:
      command: "hex analyze {{output_dir}} --json"
      parse: score_and_violations
    threshold:
      score: 90
      violations: 0

  - id: UxReviewPasses
    required: false
    agent: hex-ux
    when: has_primary_adapters
    evaluate: check_ux_review_json_verdict

  - id: DocsGenerated
    required: false
    agent: hex-documenter
    when: final_tier
    evaluate: check_readme_exists

# ── Iteration Control ──────────────────────────────────────────────────

iteration:
  max_per_tier: 5
  max_total: 25
  on_max_iterations: report_and_continue
  cooldown_ms: 1000                     # pause between iterations

# ── Grade Thresholds ───────────────────────────────────────────────────

grade_thresholds:
  interactive:
    minimum: A                          # score >= 90
  auto:
    minimum: B                          # score >= 80
  quick:
    minimum: null                       # no quality gate
