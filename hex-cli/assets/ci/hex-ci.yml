# hex CI enforcement workflow (ADR-2604061100)
# Deployed to target projects via: hex init
# Runs all hex enforcement gates on every push and pull request.
#
# Prerequisites:
#   - hex binary available on PATH (install step below)
#   - Adjust the install URL to match your hex release location
#
# See examples/ for language-specific variants (rust-workspace, etc.)

name: hex CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  hex-ci:
    name: hex enforcement gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install hex
        run: |
          # TODO: Replace with your hex release URL or install method.
          # Examples:
          #   curl -fsSL https://your-org/releases/hex-linux-x86_64.tar.gz | tar -xz -C /usr/local/bin hex
          #   brew install hex
          #   cargo install hex-cli
          echo "hex install step — configure for your environment"
          hex --version

      - name: Run hex ci
        run: hex ci
