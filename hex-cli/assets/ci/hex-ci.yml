# hex CI enforcement workflow (ADR-2604061100)
# Deployed to target projects via: hex init
# Runs all hex enforcement gates on every push and pull request.

name: hex CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  hex-ci:
    name: hex enforcement gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install hex
        run: |
          # Replace with the actual hex release URL for your organization
          curl -fsSL https://github.com/<org>/hex/releases/latest/download/hex-linux-x86_64.tar.gz \
            | tar -xz -C /usr/local/bin hex
          hex --version

      - name: Start hex nexus daemon
        run: hex nexus start --detach
        continue-on-error: true

      - name: Run hex ci
        run: hex ci

      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hex-ci-results
          path: |
            docs/workplans/
            docs/specs/
          if-no-files-found: ignore
