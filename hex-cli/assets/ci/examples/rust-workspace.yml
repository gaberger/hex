# hex CI — Rust workspace example
# Copy to .github/workflows/hex-ci.yml and adjust the install URL.
#
# This is an EXAMPLE for Rust workspaces. For the generic template
# that hex init deploys, see ../hex-ci.yml.

name: hex CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  hex-ci:
    name: hex enforcement gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install hex
        run: |
          # Replace with your org's hex release URL
          curl -fsSL https://github.com/gaberger/hex-intf/releases/latest/download/hex-linux-x86_64.tar.gz \
            | tar -xz -C /usr/local/bin hex
          hex --version

      - name: Start hex-nexus
        run: hex nexus start --detach
        continue-on-error: true

      - name: Run hex ci
        run: hex ci

      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hex-ci-results
          path: |
            docs/workplans/
            docs/specs/
          if-no-files-found: ignore
