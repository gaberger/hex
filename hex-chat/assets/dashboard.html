<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-chat — Developer Command Center</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Mono','Fira Code',monospace; background:#0d1117; color:#c9d1d9; }
.topbar { padding:10px 20px; background:#161b22; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; }
.topbar h1 { font-size:14px; color:#58a6ff; }
.topbar h1 span { color:#00d4aa; }
.conn { font-size:12px; display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; background:#f85149; }
.dot.ok { background:#3fb950; }
.grid { display:grid; grid-template-columns:250px 1fr 280px; height:calc(100vh - 65px); }
.panel { border-right:1px solid #30363d; padding:12px; overflow-y:auto; }
.panel:last-child { border-right:none; }
.panel h2 { font-size:11px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.agent { padding:6px 8px; margin-bottom:4px; border-radius:4px; font-size:12px; }
.agent:hover { background:#161b22; }
.agent .name { color:#c9d1d9; }
.agent .meta { color:#484f58; font-size:11px; }
.status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; }
.status-dot.running { background:#3fb950; }
.status-dot.idle { background:#484f58; }
#chat { display:flex; flex-direction:column; }
#messages { flex:1; overflow-y:auto; padding:12px; font-size:13px; }
.msg { margin-bottom:8px; line-height:1.5; }
.msg .sender { font-weight:600; }
.msg .sender.user { color:#3fb950; }
.msg .sender.assistant { color:#58a6ff; }
.msg .sender.system { color:#484f58; }
#inputBar { display:flex; padding:8px 12px; border-top:1px solid #30363d; background:#161b22; }
#chatInput { flex:1; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:8px 10px; border-radius:6px; font-family:inherit; font-size:13px; outline:none; }
#chatInput:focus { border-color:#58a6ff; }
#sendBtn { margin-left:8px; background:#238636; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; }
#sendBtn:hover { background:#2ea043; }
.session { padding:6px 8px; margin-bottom:2px; border-radius:4px; font-size:12px; cursor:pointer; color:#8b949e; }
.session:hover { background:#161b22; color:#c9d1d9; }
.session.active { background:#161b22; color:#58a6ff; border-left:2px solid #58a6ff; }
.empty { color:#484f58; font-size:12px; text-align:center; margin-top:30px; }
.statusbar { padding:6px 20px; background:#161b22; border-top:1px solid #30363d; font-size:11px; color:#484f58; position:fixed; bottom:0; width:100%; display:flex; gap:16px; }
.statusbar .val { color:#8b949e; }
</style>
</head>
<body>
<div class="topbar">
  <h1><span>hex</span> chat</h1>
  <div class="conn"><span class="dot" id="connDot"></span><span id="connLabel">connecting...</span></div>
</div>
<div class="grid">
  <div class="panel" id="leftPanel">
    <h2>Sessions</h2>
    <div id="sessionList"><div class="empty">Loading...</div></div>
    <h2 style="margin-top:16px">Fleet</h2>
    <div id="agentList"><div class="empty">No agents</div></div>
  </div>
  <div class="panel" id="chat">
    <div id="messages"></div>
    <div id="inputBar">
      <input id="chatInput" placeholder="Send a message..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="panel">
    <h2>Inference</h2>
    <div id="inferenceList"><div class="empty">No providers</div></div>
    <h2 style="margin-top:16px">Swarms</h2>
    <div id="swarmList"><div class="empty">No active swarms</div></div>
    <h2 style="margin-top:16px">Tokens</h2>
    <div id="tokenInfo" style="font-size:12px;color:#8b949e">--</div>
  </div>
</div>
<div class="statusbar">
  <span>NEXUS: <span class="val" id="nexusStatus">--</span></span>
  <span>AGENTS: <span class="val" id="agentCount">0</span></span>
  <span>INFERENCE: <span class="val" id="inferenceCount">0</span></span>
  <span>SESSION: <span class="val" id="sessionLabel">--</span></span>
  <span>TOKENS: <span class="val" id="tokenCount">0</span></span>
</div>
<script>
(function() {
  var NEXUS = "__NEXUS_URL__";
  var WS_BASE = "__WS_URL__";
  var ws = null;
  var sessionId = null;
  var totalIn = 0, totalOut = 0;

  function $(id) { return document.getElementById(id); }
  function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }
  function mkEmpty(text) { var d = document.createElement("div"); d.className = "empty"; d.textContent = text; return d; }
  function fmtTokens(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+"M" : n >= 1e3 ? (n/1e3).toFixed(1)+"K" : ""+n; }

  function connect(sid) {
    if (ws) ws.close();
    var url = WS_BASE + "/ws/chat";
    if (sid) url += "?session_id=" + sid;
    ws = new WebSocket(url);
    ws.onopen = function() {
      $("connDot").classList.add("ok");
      $("connLabel").textContent = "connected";
      $("nexusStatus").textContent = "connected";
    };
    ws.onclose = function() {
      $("connDot").classList.remove("ok");
      $("connLabel").textContent = "disconnected";
      $("nexusStatus").textContent = "disconnected";
    };
    ws.onmessage = function(e) {
      try {
        var env = JSON.parse(e.data);
        if (env.event === "connected") {
          sessionId = env.data.persistentSessionId || env.data.sessionId;
          $("sessionLabel").textContent = sessionId ? sessionId.slice(0,8) + "..." : "--";
          loadSessions();
        } else if (env.event === "agent_status") {
          var status = env.data.status || "idle";
          if (status === "thinking") {
            showThinking(true);
          } else {
            showThinking(false);
          }
          loadAgents();
        } else if (env.event === "chat_message") {
          showThinking(false);
          addMsg("assistant", env.data.content);
          loadSessions();
        } else if (env.event === "token_update") {
          totalIn += env.data.input_tokens || 0;
          totalOut += env.data.output_tokens || 0;
          $("tokenCount").textContent = fmtTokens(totalIn + totalOut);
          $("tokenInfo").textContent = "In: " + fmtTokens(totalIn) + "  Out: " + fmtTokens(totalOut);
        } else if (env.event === "agent_connected") {
          loadAgents();
        }
      } catch(err) {}
    };
  }

  function addMsg(role, content) {
    var d = document.createElement("div");
    d.className = "msg";
    var s = document.createElement("span");
    s.className = "sender " + role;
    s.textContent = role === "user" ? "You: " : role === "assistant" ? "Assistant: " : role + ": ";
    d.appendChild(s);
    d.appendChild(document.createTextNode(content));
    $("messages").appendChild(d);
    $("messages").scrollTop = $("messages").scrollHeight;
  }

  function send() {
    var input = $("chatInput");
    var text = input.value.trim();
    if (!text || !ws) return;
    ws.send(JSON.stringify({ type: "chat_message", content: text }));
    addMsg("user", text);
    input.value = "";
    showThinking(true);
  }

  var thinkingEl = null;
  function showThinking(on) {
    $("sendBtn").disabled = on;
    $("chatInput").disabled = on;
    if (on) {
      if (!thinkingEl) {
        thinkingEl = document.createElement("div");
        thinkingEl.className = "msg";
        thinkingEl.style.color = "#8b949e";
        thinkingEl.style.fontStyle = "italic";
        thinkingEl.textContent = "Thinking...";
        // Add animated dots
        var dots = 0;
        thinkingEl._interval = setInterval(function() {
          dots = (dots + 1) % 4;
          thinkingEl.textContent = "Thinking" + ".".repeat(dots);
        }, 400);
        $("messages").appendChild(thinkingEl);
        $("messages").scrollTop = $("messages").scrollHeight;
      }
    } else {
      if (thinkingEl) {
        clearInterval(thinkingEl._interval);
        thinkingEl.remove();
        thinkingEl = null;
      }
      $("sendBtn").disabled = false;
      $("chatInput").disabled = false;
      $("chatInput").focus();
    }
  }

  $("sendBtn").addEventListener("click", send);
  $("chatInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function forkSession(sid) {
    fetch(NEXUS + "/api/sessions/" + sid + "/fork", { method: "POST", headers: {"Content-Type": "application/json"}, body: "{}" })
      .then(function() { loadSessions(); })
      .catch(function() {});
  }

  function compactSession(sid) {
    fetch(NEXUS + "/api/sessions/" + sid + "/compact", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({summary: "Compacted session"}) })
      .then(function() { loadSessions(); })
      .catch(function() {});
  }

  function loadSessions() {
    fetch(NEXUS + "/api/sessions?project_id=&limit=20")
      .then(function(r) { return r.json(); })
      .then(function(sessions) {
        var el = $("sessionList");
        clearChildren(el);
        if (!sessions.length) { el.appendChild(mkEmpty("No sessions")); return; }
        sessions.forEach(function(s) {
          var d = document.createElement("div");
          d.className = "session" + (s.id === sessionId ? " active" : "");

          var label = document.createElement("span");
          label.textContent = (s.title || "Untitled").slice(0, 30) + " (" + s.messageCount + " msgs)";
          d.appendChild(label);

          var actions = document.createElement("span");
          actions.style.cssText = "float:right;opacity:0;transition:opacity 0.15s;";

          var forkBtn = document.createElement("button");
          forkBtn.textContent = "fork";
          forkBtn.style.cssText = "background:none;border:none;color:#58a6ff;cursor:pointer;font-size:10px;margin-left:4px;";
          forkBtn.addEventListener("click", function(e) { e.stopPropagation(); forkSession(s.id); });

          var compactBtn = document.createElement("button");
          compactBtn.textContent = "compact";
          compactBtn.style.cssText = "background:none;border:none;color:#f0883e;cursor:pointer;font-size:10px;margin-left:4px;";
          compactBtn.addEventListener("click", function(e) { e.stopPropagation(); compactSession(s.id); });

          actions.appendChild(forkBtn);
          actions.appendChild(compactBtn);
          d.appendChild(actions);

          d.addEventListener("mouseenter", function() { actions.style.opacity = "1"; });
          d.addEventListener("mouseleave", function() { actions.style.opacity = "0"; });

          d.addEventListener("click", function() {
            connect(s.id);
            clearChildren($("messages"));
            loadMessages(s.id);
          });
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  function loadMessages(sid) {
    fetch(NEXUS + "/api/sessions/" + sid + "/messages?limit=100")
      .then(function(r) { return r.json(); })
      .then(function(msgs) {
        msgs.forEach(function(m) {
          var text = (m.parts || []).map(function(p) { return p.content || p.tool_name || ""; }).join("");
          if (text) addMsg(m.role, text);
        });
      })
      .catch(function() {});
  }

  function loadAgents() {
    fetch(NEXUS + "/api/agents")
      .then(function(r) { return r.json(); })
      .then(function(agents) {
        var el = $("agentList");
        $("agentCount").textContent = agents.length;
        clearChildren(el);
        if (!agents.length) { el.appendChild(mkEmpty("No agents")); return; }
        agents.forEach(function(a) {
          var d = document.createElement("div");
          d.className = "agent";
          var dot = document.createElement("span");
          dot.className = "status-dot " + (a.status === "running" ? "running" : "idle");
          d.appendChild(dot);
          var name = document.createElement("span");
          name.className = "name";
          name.textContent = a.name;
          d.appendChild(name);
          var meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = a.model || "";
          d.appendChild(meta);
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  function loadSwarms() {
    fetch(NEXUS + "/api/swarms/active")
      .then(function(r) { return r.json(); })
      .then(function(swarms) {
        var el = $("swarmList");
        clearChildren(el);
        if (!swarms.length) { el.appendChild(mkEmpty("No active swarms")); return; }
        swarms.forEach(function(s) {
          var d = document.createElement("div");
          d.className = "agent";
          var name = document.createElement("span");
          name.className = "name";
          name.textContent = s.name;
          d.appendChild(name);
          var meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = s.status;
          d.appendChild(meta);
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  function loadInference() {
    fetch(NEXUS + "/api/inference/endpoints")
      .then(function(r) { return r.json(); })
      .then(function(endpoints) {
        var el = $("inferenceList");
        clearChildren(el);
        var list = Array.isArray(endpoints) ? endpoints : Object.values(endpoints);
        $("inferenceCount").textContent = list.length;
        if (!list.length) { el.appendChild(mkEmpty("No providers registered. Use: hex inference add <provider> <url>")); return; }

        // Group by provider
        var byProvider = {};
        list.forEach(function(ep) {
          var key = ep.provider || "unknown";
          if (!byProvider[key]) byProvider[key] = [];
          byProvider[key].push(ep);
        });

        Object.keys(byProvider).forEach(function(provider) {
          var header = document.createElement("div");
          header.style.cssText = "font-size:11px;color:#58a6ff;font-weight:600;margin:8px 0 4px;text-transform:uppercase;";
          header.textContent = provider;
          el.appendChild(header);

          byProvider[provider].forEach(function(ep) {
            var d = document.createElement("div");
            d.className = "agent";

            var dot = document.createElement("span");
            var isHealthy = ep.status === "healthy" || ep.status === "ok";
            dot.className = "status-dot " + (isHealthy ? "running" : "idle");
            d.appendChild(dot);

            var name = document.createElement("span");
            name.className = "name";
            name.textContent = ep.model || ep.id || "default";
            d.appendChild(name);

            var urlMeta = document.createElement("div");
            urlMeta.className = "meta";
            urlMeta.textContent = ep.url || "";
            d.appendChild(urlMeta);

            var statusMeta = document.createElement("div");
            statusMeta.className = "meta";
            statusMeta.style.color = isHealthy ? "#3fb950" : "#f85149";
            statusMeta.textContent = ep.status || "unknown";
            if (ep.health_checked_at) {
              statusMeta.textContent += " (checked " + timeAgo(ep.health_checked_at) + ")";
            }
            d.appendChild(statusMeta);

            // If Ollama, try to fetch models
            if (provider === "ollama" && ep.url) {
              fetchOllamaModels(ep.url, d);
            }

            el.appendChild(d);
          });
        });
      })
      .catch(function() {});
  }

  function fetchOllamaModels(baseUrl, parentEl) {
    fetch(baseUrl + "/api/tags")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var models = data.models || [];
        if (!models.length) return;
        var modelsDiv = document.createElement("div");
        modelsDiv.className = "meta";
        modelsDiv.style.cssText = "margin-left:12px;color:#8b949e;";
        var names = models.map(function(m) { return m.name; }).slice(0, 8);
        modelsDiv.textContent = "Models: " + names.join(", ");
        if (models.length > 8) modelsDiv.textContent += " (+" + (models.length - 8) + " more)";
        parentEl.appendChild(modelsDiv);
      })
      .catch(function() {});
  }

  function timeAgo(isoStr) {
    if (!isoStr) return "";
    var secs = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.floor(secs/60) + "m ago";
    if (secs < 86400) return Math.floor(secs/3600) + "h ago";
    return Math.floor(secs/86400) + "d ago";
  }

  function loadRlStats() {
    fetch(NEXUS + "/api/rl/stats")
      .then(function(r) { return r.json(); })
      .then(function(stats) {
        if (stats && stats.total_experiences !== undefined) {
          var info = $("tokenInfo");
          var existing = info.textContent;
          if (existing === "--") existing = "";
          var rl = "RL: " + stats.total_experiences + " exp, e=" + (stats.epsilon || 0).toFixed(2);
          info.textContent = existing ? existing + " | " + rl : rl;
        }
      })
      .catch(function() {});
  }

  // Boot
  connect();
  loadAgents();
  loadSwarms();
  loadInference();
  loadRlStats();
  setInterval(loadAgents, 5000);
  setInterval(loadSwarms, 10000);
  setInterval(loadInference, 10000);
})();
</script>
</body>
</html>
