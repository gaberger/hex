<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-chat — Developer Command Center</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Mono','Fira Code',monospace; background:#0d1117; color:#c9d1d9; }
.topbar { padding:10px 20px; background:#161b22; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; }
.topbar h1 { font-size:14px; color:#58a6ff; }
.topbar h1 span { color:#00d4aa; }
.conn { font-size:12px; display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; background:#f85149; }
.dot.ok { background:#3fb950; }
.grid { display:grid; grid-template-columns:250px 1fr 280px; height:calc(100vh - 65px); }
.panel { border-right:1px solid #30363d; padding:12px; overflow-y:auto; }
.panel:last-child { border-right:none; }
.panel h2 { font-size:11px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.agent { padding:6px 8px; margin-bottom:4px; border-radius:4px; font-size:12px; }
.agent:hover { background:#161b22; }
.agent .name { color:#c9d1d9; }
.agent .meta { color:#484f58; font-size:11px; }
.status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; }
.status-dot.running { background:#3fb950; }
.status-dot.idle { background:#484f58; }
#chat { display:flex; flex-direction:column; }
#messages { flex:1; overflow-y:auto; padding:12px; font-size:13px; }
.msg { margin-bottom:8px; line-height:1.5; }
.msg .sender { font-weight:600; }
.msg .sender.user { color:#3fb950; }
.msg .sender.assistant { color:#58a6ff; }
.msg .sender.system { color:#484f58; }
#inputBar { display:flex; padding:8px 12px; border-top:1px solid #30363d; background:#161b22; }
#chatInput { flex:1; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:8px 10px; border-radius:6px; font-family:inherit; font-size:13px; outline:none; }
#chatInput:focus { border-color:#58a6ff; }
#sendBtn { margin-left:8px; background:#238636; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; }
#sendBtn:hover { background:#2ea043; }
.session { padding:6px 8px; margin-bottom:2px; border-radius:4px; font-size:12px; cursor:pointer; color:#8b949e; }
.session:hover { background:#161b22; color:#c9d1d9; }
.session.active { background:#161b22; color:#58a6ff; border-left:2px solid #58a6ff; }
.empty { color:#484f58; font-size:12px; text-align:center; margin-top:30px; }
.statusbar { padding:6px 20px; background:#161b22; border-top:1px solid #30363d; font-size:11px; color:#484f58; position:fixed; bottom:0; width:100%; display:flex; gap:16px; }
.statusbar .val { color:#8b949e; }
</style>
</head>
<body>
<div class="topbar">
  <h1><span>hex</span> chat</h1>
  <div class="conn"><span class="dot" id="connDot"></span><span id="connLabel">connecting...</span></div>
</div>
<div class="grid">
  <div class="panel" id="leftPanel">
    <h2>Sessions</h2>
    <div id="sessionList"><div class="empty">Loading...</div></div>
    <h2 style="margin-top:16px">Fleet</h2>
    <div id="agentList"><div class="empty">No agents</div></div>
  </div>
  <div class="panel" id="chat">
    <div id="messages"></div>
    <div id="inputBar">
      <input id="chatInput" placeholder="Send a message..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="panel">
    <h2>Swarms</h2>
    <div id="swarmList"><div class="empty">No active swarms</div></div>
    <h2 style="margin-top:16px">Tokens</h2>
    <div id="tokenInfo" style="font-size:12px;color:#8b949e">--</div>
  </div>
</div>
<div class="statusbar">
  <span>NEXUS: <span class="val" id="nexusStatus">--</span></span>
  <span>AGENTS: <span class="val" id="agentCount">0</span></span>
  <span>SESSION: <span class="val" id="sessionLabel">--</span></span>
  <span>TOKENS: <span class="val" id="tokenCount">0</span></span>
</div>
<script>
(function() {
  var NEXUS = "__NEXUS_URL__";
  var WS_BASE = "__WS_URL__";
  var ws = null;
  var sessionId = null;
  var totalIn = 0, totalOut = 0;

  function $(id) { return document.getElementById(id); }
  function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }
  function mkEmpty(text) { var d = document.createElement("div"); d.className = "empty"; d.textContent = text; return d; }
  function fmtTokens(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+"M" : n >= 1e3 ? (n/1e3).toFixed(1)+"K" : ""+n; }

  function connect(sid) {
    if (ws) ws.close();
    var url = WS_BASE + "/ws/chat";
    if (sid) url += "?session_id=" + sid;
    ws = new WebSocket(url);
    ws.onopen = function() {
      $("connDot").classList.add("ok");
      $("connLabel").textContent = "connected";
      $("nexusStatus").textContent = "connected";
    };
    ws.onclose = function() {
      $("connDot").classList.remove("ok");
      $("connLabel").textContent = "disconnected";
      $("nexusStatus").textContent = "disconnected";
    };
    ws.onmessage = function(e) {
      try {
        var env = JSON.parse(e.data);
        if (env.event === "connected") {
          sessionId = env.data.persistentSessionId || env.data.sessionId;
          $("sessionLabel").textContent = sessionId ? sessionId.slice(0,8) + "..." : "--";
          loadSessions();
        } else if (env.event === "chat_message") {
          addMsg("assistant", env.data.content);
        } else if (env.event === "token_update") {
          totalIn += env.data.input_tokens || 0;
          totalOut += env.data.output_tokens || 0;
          $("tokenCount").textContent = fmtTokens(totalIn + totalOut);
          $("tokenInfo").textContent = "In: " + fmtTokens(totalIn) + "  Out: " + fmtTokens(totalOut);
        } else if (env.event === "agent_connected" || env.event === "agent_status") {
          loadAgents();
        }
      } catch(err) {}
    };
  }

  function addMsg(role, content) {
    var d = document.createElement("div");
    d.className = "msg";
    var s = document.createElement("span");
    s.className = "sender " + role;
    s.textContent = role === "user" ? "You: " : role === "assistant" ? "Assistant: " : role + ": ";
    d.appendChild(s);
    d.appendChild(document.createTextNode(content));
    $("messages").appendChild(d);
    $("messages").scrollTop = $("messages").scrollHeight;
  }

  function send() {
    var input = $("chatInput");
    var text = input.value.trim();
    if (!text || !ws) return;
    ws.send(JSON.stringify({ type: "chat_message", content: text }));
    addMsg("user", text);
    input.value = "";
  }

  $("sendBtn").addEventListener("click", send);
  $("chatInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function loadSessions() {
    fetch(NEXUS + "/api/sessions?project_id=&limit=20")
      .then(function(r) { return r.json(); })
      .then(function(sessions) {
        var el = $("sessionList");
        clearChildren(el);
        if (!sessions.length) { el.appendChild(mkEmpty("No sessions")); return; }
        sessions.forEach(function(s) {
          var d = document.createElement("div");
          d.className = "session" + (s.id === sessionId ? " active" : "");
          d.textContent = (s.title || "Untitled").slice(0, 30) + " (" + s.messageCount + " msgs)";
          d.addEventListener("click", function() {
            connect(s.id);
            clearChildren($("messages"));
            loadMessages(s.id);
          });
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  function loadMessages(sid) {
    fetch(NEXUS + "/api/sessions/" + sid + "/messages?limit=100")
      .then(function(r) { return r.json(); })
      .then(function(msgs) {
        msgs.forEach(function(m) {
          var text = (m.parts || []).map(function(p) { return p.content || p.tool_name || ""; }).join("");
          if (text) addMsg(m.role, text);
        });
      })
      .catch(function() {});
  }

  function loadAgents() {
    fetch(NEXUS + "/api/agents")
      .then(function(r) { return r.json(); })
      .then(function(agents) {
        var el = $("agentList");
        $("agentCount").textContent = agents.length;
        clearChildren(el);
        if (!agents.length) { el.appendChild(mkEmpty("No agents")); return; }
        agents.forEach(function(a) {
          var d = document.createElement("div");
          d.className = "agent";
          var dot = document.createElement("span");
          dot.className = "status-dot " + (a.status === "running" ? "running" : "idle");
          d.appendChild(dot);
          var name = document.createElement("span");
          name.className = "name";
          name.textContent = a.name;
          d.appendChild(name);
          var meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = a.model || "";
          d.appendChild(meta);
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  function loadSwarms() {
    fetch(NEXUS + "/api/swarms/active")
      .then(function(r) { return r.json(); })
      .then(function(swarms) {
        var el = $("swarmList");
        clearChildren(el);
        if (!swarms.length) { el.appendChild(mkEmpty("No active swarms")); return; }
        swarms.forEach(function(s) {
          var d = document.createElement("div");
          d.className = "agent";
          var name = document.createElement("span");
          name.className = "name";
          name.textContent = s.name;
          d.appendChild(name);
          var meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = s.status;
          d.appendChild(meta);
          el.appendChild(d);
        });
      })
      .catch(function() {});
  }

  // Boot
  connect();
  loadAgents();
  loadSwarms();
  setInterval(loadAgents, 5000);
  setInterval(loadSwarms, 10000);
})();
</script>
</body>
</html>
