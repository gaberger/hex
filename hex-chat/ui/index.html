<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-chat — Developer Command Center</title>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>
<div class="topbar">
  <h1><span>hex</span> chat</h1>
  <div class="conn"><span class="dot" id="connDot"></span><span id="connLabel">connecting...</span></div>
</div>
<div class="grid">
  <div class="panel" id="leftPanel">
    <h2>Sessions</h2>
    <div id="sessionList"><div class="empty">Loading...</div></div>
    <h2 style="margin-top:16px">Fleet</h2>
    <div id="agentList"><div class="empty">No agents</div></div>
  </div>
  <div class="panel" id="chat">
    <div id="messages"></div>
    <div id="inputBar">
      <input id="chatInput" placeholder="Send a message..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="panel">
    <h2>Inference</h2>
    <div id="inferenceList"><div class="empty">No providers</div></div>
    <h2 style="margin-top:16px">Swarms</h2>
    <div id="swarmList"><div class="empty">No active swarms</div></div>
    <h2 style="margin-top:16px">Tokens</h2>
    <div id="tokenInfo" style="font-size:12px;color:#8b949e">--</div>
  </div>
</div>
<div class="statusbar">
  <span>NEXUS: <span class="val" id="nexusStatus">--</span></span>
  <span>AGENTS: <span class="val" id="agentCount">0</span></span>
  <span>INFERENCE: <span class="val" id="inferenceCount">0</span></span>
  <span>SESSION: <span class="val" id="sessionLabel">--</span></span>
  <span>TOKENS: <span class="val" id="tokenCount">0</span></span>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
