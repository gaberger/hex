<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Decorative hexagons background -->
  <g opacity="0.06" fill="none" stroke="#58a6ff" stroke-width="1">
    <polygon points="80,60 110,45 140,60 140,90 110,105 80,90"/>
    <polygon points="720,200 750,185 780,200 780,230 750,245 720,230"/>
    <polygon points="150,210 180,195 210,210 210,240 180,255 150,240"/>
    <polygon points="620,50 650,35 680,50 680,80 650,95 620,80"/>
    <polygon points="800,120 830,105 860,120 860,150 830,165 800,150"/>
    <polygon points="40,160 70,145 100,160 100,190 70,205 40,190"/>
  </g>
  <g opacity="0.04" fill="none" stroke="#bc8cff" stroke-width="1">
    <polygon points="760,80 790,65 820,80 820,110 790,125 760,110"/>
    <polygon points="100,130 130,115 160,130 160,160 130,175 100,160"/>
    <polygon points="680,260 710,245 740,260 740,290 710,305 680,290"/>
  </g>

  <!-- Main hexagon icon -->
  <g transform="translate(200, 150)">
    <!-- Outer glow -->
    <polygon points="0,-55 48,-27.5 48,27.5 0,55 -48,27.5 -48,-27.5"
             fill="none" stroke="url(#hex-grad)" stroke-width="2" opacity="0.3" filter="url(#glow-filter)"/>
    <!-- Main hexagon -->
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"
             fill="none" stroke="url(#hex-grad)" stroke-width="2.5"/>
    <!-- Inner hexagon -->
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="url(#hex-grad)" opacity="0.15"/>
    <!-- Port dots -->
    <circle cx="0" cy="-45" r="3" fill="#58a6ff"/>
    <circle cx="39" cy="-22.5" r="3" fill="#58a6ff"/>
    <circle cx="39" cy="22.5" r="3" fill="#bc8cff"/>
    <circle cx="0" cy="45" r="3" fill="#bc8cff"/>
    <circle cx="-39" cy="22.5" r="3" fill="#bc8cff"/>
    <circle cx="-39" cy="-22.5" r="3" fill="#58a6ff"/>
    <!-- Connection lines from ports -->
    <line x1="0" y1="-45" x2="0" y2="-65" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
    <line x1="39" y1="-22.5" x2="59" y2="-32" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
    <line x1="39" y1="22.5" x2="59" y2="32" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="45" x2="0" y2="65" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
    <line x1="-39" y1="22.5" x2="-59" y2="32" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
    <line x1="-39" y1="-22.5" x2="-59" y2="-32" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Title text -->
  <text x="340" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">hex</text>

  <!-- Subtitle -->
  <text x="340" y="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.5">AI Operating System</text>
  <text x="340" y="185" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.5">for Agent-Driven Development</text>

  <!-- Tagline bar -->
  <rect x="340" y="205" width="420" height="1" fill="url(#glow)" rx="1"/>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11">
    <rect x="340" y="220" width="100" height="24" rx="12" fill="#58a6ff" opacity="0.15" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="390" y="236" fill="#58a6ff" text-anchor="middle">Microkernel</text>

    <rect x="450" y="220" width="115" height="24" rx="12" fill="#bc8cff" opacity="0.15" stroke="#bc8cff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="507" y="236" fill="#bc8cff" text-anchor="middle">Swarm Agents</text>

    <rect x="575" y="220" width="105" height="24" rx="12" fill="#3fb950" opacity="0.15" stroke="#3fb950" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="627" y="236" fill="#3fb950" text-anchor="middle">RL Inference</text>

    <rect x="690" y="220" width="85" height="24" rx="12" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="732" y="236" fill="#f0883e" text-anchor="middle">Capability</text>
  </g>
</svg>
