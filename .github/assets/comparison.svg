    <text x="87" y="25" font-family="'Segoe UI', sans-serif" font-size="13" fill="#f77868" text-anchor="middle" font-weight="600">SpecKit</text>
    <line x1="15" y1="35" x2="160" y2="35" stroke="#f77868" stroke-width="0.5" opacity="0.3"/>
    <text x="87" y="58" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#c9d1d9" text-anchor="middle">Spec-driven workflow</text>
