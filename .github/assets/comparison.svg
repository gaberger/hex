    <text x="92" y="74" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#7ee787" text-anchor="middle">Enforced architecture</text>
    <text x="92" y="90" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#7ee787" text-anchor="middle">Swarm coordination</text>
    <line x1="30" y1="103" x2="155" y2="103" stroke="#30363d" stroke-width="0.5"/>
    <text x="92" y="122" font-family="'Segoe UI', sans-serif" font-size="8.5" fill="#3fb950" text-anchor="middle" font-weight="600">RL inference routing</text>
    <text x="92" y="135" font-family="'Segoe UI', sans-serif" font-size="8.5" fill="#3fb950" text-anchor="middle" font-weight="600">Capability auth</text>
