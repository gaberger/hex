    <text x="295" y="68" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="405" y="68" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="515" y="68" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="645" y="68" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">●</text>

