    <text x="295" y="88" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="405" y="88" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="515" y="88" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="645" y="88" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">●</text>

    <!-- Row 4 -->
    <text x="25" y="108" font-family="'Segoe UI', sans-serif" font-size="9" fill="#c9d1d9">RL-driven inference routing</text>
    <text x="295" y="108" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="405" y="108" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="515" y="108" font-family="'Segoe UI', sans-serif" font-size="10" fill="#bc8cff" text-anchor="middle">~</text>
    <text x="645" y="108" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">●</text>

    <!-- Row 5 -->
    <text x="25" y="128" font-family="'Segoe UI', sans-serif" font-size="9" fill="#c9d1d9">Specs-first development pipeline</text>
    <text x="295" y="128" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">~</text>
    <text x="405" y="128" font-family="'Segoe UI', sans-serif" font-size="10" fill="#f77868" text-anchor="middle">●</text>
    <text x="515" y="128" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="645" y="128" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">●</text>

    <!-- Row 6 -->
    <text x="25" y="148" font-family="'Segoe UI', sans-serif" font-size="9" fill="#c9d1d9">Capability-based security</text>
    <text x="295" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="405" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="515" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#484f58" text-anchor="middle">—</text>
    <text x="645" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">●</text>

    <!-- Legend -->
