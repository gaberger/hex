<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="cmp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="380" fill="url(#cmp-bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">HOW THEY COMPARE</text>

  <!-- BAML Column -->
  <g transform="translate(25, 50)">
    <rect width="175" height="140" rx="10" fill="#d299221a" stroke="#d29922" stroke-width="1" stroke-opacity="0.4"/>
    <text x="87" y="25" font-family="'Segoe UI', sans-serif" font-size="13" fill="#d29922" text-anchor="middle" font-weight="600">BAML</text>
    <line x1="15" y1="35" x2="160" y2="35" stroke="#d29922" stroke-width="0.5" opacity="0.3"/>
    <text x="87" y="58" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#c9d1d9" text-anchor="middle">Typed LLM functions</text>
    <text x="87" y="74" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#c9d1d9" text-anchor="middle">Schema validation</text>
    <text x="87" y="90" font-family="'Segoe UI', sans-serif" font-size="9.5" fill="#c9d1d9" text-anchor="middle">Single-call focus</text>
    <line x1="30" y1="103" x2="145" y2="103" stroke="#30363d" stroke-width="0.5"/>
    <text x="87" y="122" font-family="'Segoe UI', sans-serif" font-size="8.5" fill="#d29922" text-anchor="middle" opacity="0.8">No orchestration</text>
    <text x="87" y="135" font-family="'Segoe UI', sans-serif" font-size="8.5" fill="#d29922" text-anchor="middle" opacity="0.8">No agent lifecycle</text>
  </g>

