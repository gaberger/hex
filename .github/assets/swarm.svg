<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="hexflo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff20"/>
      <stop offset="100%" style="stop-color:#58a6ff08"/>
    </linearGradient>
    <linearGradient id="gate-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="40%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- ── HEXFLO ORCHESTRATION BAR ──────────────────────────── -->
  <rect x="20" y="18" width="760" height="58" rx="8" fill="url(#hexflo-grad)" stroke="#58a6ff" stroke-width="1" opacity="0.9"/>

  <!-- HexFlo label -->
  <text x="36" y="38" font-family="'SF Mono', monospace" font-size="13" fill="#58a6ff" font-weight="700" letter-spacing="0.5">HexFlo</text>
  <text x="36" y="54" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">Native Rust orchestration · hex-nexus/src/coordination/</text>
  <text x="36" y="67" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#484f58">heartbeat 15s · stale 45s · dead 120s · CAS task claims · auto-reclamation</text>

  <!-- SpacetimeDB badge -->
  <rect x="590" y="26" width="180" height="42" rx="6" fill="#0d111700" stroke="#3fb950" stroke-width="1"/>
  <text x="680" y="43" font-family="'SF Mono', monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">SpacetimeDB</text>
  <text x="680" y="57" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">WebSocket sync · swarm / task / memory</text>

  <!-- ── PLANNER ────────────────────────────────────────────── -->
  <line x1="400" y1="76" x2="400" y2="108" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <g transform="translate(400, 124)">
    <rect x="-64" y="-18" width="128" height="34" rx="7" fill="#58a6ff0d" stroke="#58a6ff" stroke-width="1.2"/>
    <text y="-2" font-family="'SF Mono', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">planner</text>
    <text y="11" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">workplan decomposition → adapter boundaries</text>
  </g>

  <!-- ── TIER 0 QUALITY GATE ──────────────────────────────── -->
  <line x1="400" y1="142" x2="400" y2="158" stroke="#484f58" stroke-width="1" opacity="0.6"/>
  <rect x="20" y="158" width="760" height="22" rx="4" fill="url(#gate-grad)"/>
  <text x="400" y="173" font-family="'SF Mono', monospace" font-size="9" fill="#d29922" text-anchor="middle" letter-spacing="1">TIER 0  ·  domain + ports  ·  no external deps</text>

  <!-- Tier 0 agents -->
  <g transform="translate(240, 215)">
    <rect x="-72" y="-20" width="144" height="38" rx="7" fill="#bc8cff0d" stroke="#bc8cff" stroke-width="1.2"/>
    <text y="-4" font-family="'SF Mono', monospace" font-size="10" fill="#bc8cff" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">domain/  · hex-core/</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#484f58" text-anchor="middle">wt: feat/x/domain</text>
  </g>
  <g transform="translate(560, 215)">
    <rect x="-72" y="-20" width="144" height="38" rx="7" fill="#bc8cff0d" stroke="#bc8cff" stroke-width="1.2"/>
    <text y="-4" font-family="'SF Mono', monospace" font-size="10" fill="#bc8cff" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">ports/  · typed interfaces</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#484f58" text-anchor="middle">wt: feat/x/ports</text>
  </g>
  <line x1="400" y1="180" x2="240" y2="195" stroke="#bc8cff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="400" y1="180" x2="560" y2="195" stroke="#bc8cff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- ── CI GATE: cargo check ──────────────────────────────── -->
  <line x1="240" y1="233" x2="400" y2="248" stroke="#484f58" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="233" x2="400" y2="248" stroke="#484f58" stroke-width="1" opacity="0.4"/>
  <rect x="20" y="248" width="760" height="22" rx="4" fill="url(#gate-grad)"/>
  <!-- Gate icon -->
  <polygon points="392,254 400,268 408,254" fill="#f0883e" opacity="0.9"/>
  <text x="420" y="263" font-family="'SF Mono', monospace" font-size="9" fill="#f0883e" letter-spacing="1">cargo check --workspace  ·  BLOCKS tier advance on error</text>

  <!-- ── TIER 1 + 2 ─────────────────────────────────────────── -->
  <rect x="20" y="270" width="760" height="22" rx="4" fill="url(#gate-grad)"/>
  <text x="400" y="285" font-family="'SF Mono', monospace" font-size="9" fill="#d29922" text-anchor="middle" letter-spacing="1">TIER 1  ·  secondary adapters  ·  parallel worktrees</text>

  <!-- Tier 1 agents (3 parallel) -->
  <g transform="translate(140, 326)">
    <rect x="-60" y="-18" width="120" height="36" rx="6" fill="#3fb9500d" stroke="#3fb950" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">adapters/secondary/db</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">wt: feat/x/sec-db</text>
  </g>
  <g transform="translate(310, 326)">
    <rect x="-60" y="-18" width="120" height="36" rx="6" fill="#3fb9500d" stroke="#3fb950" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">adapters/secondary/git</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">wt: feat/x/sec-git</text>
  </g>
  <g transform="translate(490, 326)">
    <rect x="-60" y="-18" width="120" height="36" rx="6" fill="#3fb9500d" stroke="#3fb950" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">adapters/primary/cli</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">wt: feat/x/pri-cli</text>
  </g>
  <g transform="translate(660, 326)">
    <rect x="-60" y="-18" width="120" height="36" rx="6" fill="#3fb9500d" stroke="#3fb950" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="600">hex-coder</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">adapters/primary/mcp</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">wt: feat/x/pri-mcp</text>
  </g>
  <line x1="400" y1="292" x2="140" y2="308" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="400" y1="292" x2="310" y2="308" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="400" y1="292" x2="490" y2="308" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="400" y1="292" x2="660" y2="308" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- ── CI GATE: hex analyze + tests ─────────────────────── -->
  <line x1="140" y1="344" x2="400" y2="360" stroke="#484f58" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="344" x2="400" y2="360" stroke="#484f58" stroke-width="1" opacity="0.3"/>
  <line x1="490" y1="344" x2="400" y2="360" stroke="#484f58" stroke-width="1" opacity="0.3"/>
  <line x1="660" y1="344" x2="400" y2="360" stroke="#484f58" stroke-width="1" opacity="0.3"/>
  <rect x="20" y="360" width="760" height="22" rx="4" fill="url(#gate-grad)"/>
  <polygon points="392,366 400,380 408,366" fill="#f0883e" opacity="0.9"/>
  <text x="420" y="375" font-family="'SF Mono', monospace" font-size="9" fill="#f0883e" letter-spacing="1">hex analyze .  ·  bun test  ·  boundary violations = BLOCKED</text>

  <!-- ── INTEGRATION ROW ───────────────────────────────────── -->
  <line x1="400" y1="382" x2="300" y2="408" stroke="#484f58" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="382" x2="500" y2="408" stroke="#484f58" stroke-width="1" opacity="0.5"/>

  <g transform="translate(230, 426)">
    <rect x="-80" y="-18" width="160" height="36" rx="7" fill="#d299220d" stroke="#d29922" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="10" fill="#d29922" text-anchor="middle" font-weight="600">integrator</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">merge worktrees · dependency order</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">domain → ports → secondary → primary</text>
  </g>

  <line x1="310" y1="426" x2="370" y2="426" stroke="#d29922" stroke-width="1" opacity="0.5"/>

  <g transform="translate(480, 426)">
    <rect x="-80" y="-18" width="160" height="36" rx="7" fill="#f885500d" stroke="#f88500" stroke-width="1.2"/>
    <text y="-3" font-family="'SF Mono', monospace" font-size="10" fill="#f88500" text-anchor="middle" font-weight="600">validation-judge</text>
    <text y="9" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" fill="#8b949e" text-anchor="middle">PASS / FAIL verdict · BLOCKING gate</text>
    <text y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">hex ci · done-condition verification</text>
  </g>

  <line x1="400" y1="426" x2="400" y2="426" stroke="#f88500" stroke-width="1" opacity="0.5"/>

  <!-- ── CI BADGE ──────────────────────────────────────────── -->
  <rect x="20" y="472" width="760" height="22" rx="4" fill="#161b2200" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="487" font-family="'SF Mono', monospace" font-size="8" fill="#484f58" text-anchor="middle" letter-spacing="1.5">hex-ci · enforced at commit · no bypass · every boundary violation surfaces before merge</text>

</svg>
