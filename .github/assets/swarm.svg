<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="sw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="agent-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="800" height="340" fill="url(#sw-bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">MULTI-AGENT SWARM COORDINATION</text>

  <!-- Planner Agent -->
  <g transform="translate(400, 90)">
    <circle r="35" fill="#58a6ff10" stroke="#58a6ff" stroke-width="1.5"/>
    <circle r="35" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.3" filter="url(#agent-glow)"/>
    <text y="-5" font-family="'SF Mono', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">Planner</text>
    <text y="10" font-family="'Segoe UI', sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">workplan</text>
  </g>

  <!-- Lines from planner to coders -->
  <line x1="370" y1="115" x2="200" y2="175" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="400" y1="125" x2="400" y2="175" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="430" y1="115" x2="600" y2="175" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Coder A -->
  <g transform="translate(200, 210)">
    <circle r="35" fill="#bc8cff10" stroke="#bc8cff" stroke-width="1.5"/>
    <text y="-10" font-family="'SF Mono', monospace" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="600">Coder A</text>
    <text y="5" font-family="'Segoe UI', sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">IAuthPort</text>
    <text y="17" font-family="'Segoe UI', sans-serif" font-size="7" fill="#484f58" text-anchor="middle">worktree-a</text>
  </g>

  <!-- Coder B -->
  <g transform="translate(400, 210)">
    <circle r="35" fill="#3fb95010" stroke="#3fb950" stroke-width="1.5"/>
    <text y="-10" font-family="'SF Mono', monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">Coder B</text>
    <text y="5" font-family="'Segoe UI', sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">ICachePort</text>
    <text y="17" font-family="'Segoe UI', sans-serif" font-size="7" fill="#484f58" text-anchor="middle">worktree-b</text>
  </g>

  <!-- Tester -->
  <g transform="translate(600, 210)">
    <circle r="35" fill="#f0883e10" stroke="#f0883e" stroke-width="1.5"/>
    <text y="-10" font-family="'SF Mono', monospace" font-size="11" fill="#f0883e" text-anchor="middle" font-weight="600">Tester</text>
    <text y="5" font-family="'Segoe UI', sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">property tests</text>
    <text y="17" font-family="'Segoe UI', sans-serif" font-size="7" fill="#484f58" text-anchor="middle">worktree-c</text>
  </g>

  <!-- Lines to integrator -->
  <line x1="200" y1="245" x2="400" y2="290" stroke="#bc8cff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="400" y1="245" x2="400" y2="290" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="600" y1="245" x2="400" y2="290" stroke="#f0883e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Integrator -->
  <g transform="translate(400, 310)">
    <rect x="-90" y="-20" width="180" height="35" rx="8" fill="#d2992210" stroke="#d29922" stroke-width="1.5"/>
    <text y="-2" font-family="'SF Mono', monospace" font-size="11" fill="#d29922" text-anchor="middle" font-weight="600">Integrator</text>
    <text y="11" font-family="'Segoe UI', sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">merge worktrees + integration tests</text>
  </g>

  <!-- Side labels -->
  <g font-family="'Segoe UI', sans-serif" font-size="8" fill="#484f58">
    <text x="50" y="95" text-anchor="start">Each agent gets:</text>
    <text x="50" y="115" text-anchor="start" fill="#58a6ff">Isolated git worktree</text>
    <text x="50" y="130" text-anchor="start" fill="#bc8cff">Single adapter boundary</text>
    <text x="50" y="145" text-anchor="start" fill="#3fb950">File-level claims</text>
    <text x="50" y="160" text-anchor="start" fill="#f0883e">Pattern learning</text>
  </g>

  <!-- Ruflo label -->
  <rect x="625" y="75" width="140" height="45" rx="8" fill="#16161810" stroke="#30363d" stroke-width="0.5"/>
  <text x="695" y="93" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Coordinated by</text>
  <text x="695" y="110" font-family="'SF Mono', monospace" font-size="12" fill="#58a6ff" text-anchor="middle" font-weight="600">ruflo</text>
</svg>
