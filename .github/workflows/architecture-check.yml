name: Architecture Check

# Hexagonal architecture dependency-direction gate.
# Workplan: wp-hexagonal-architecture-foundation P1.3
# ADR:      ADR-001

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  dependency-direction:
    name: Dependency direction (grep-based)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency-direction scan
        run: ./scripts/check-dependencies.sh

  hex-analyze:
    name: hex analyze (canonical)
    runs-on: ubuntu-latest
    needs: dependency-direction
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: arch-check
      - name: Pre-create embedded asset dir
        run: mkdir -p hex-nexus/assets/dist
      - name: Build hex-cli (release)
        run: cargo build -p hex-cli --release
      - name: Run canonical hex analyze
        run: ./scripts/check-dependencies.sh
