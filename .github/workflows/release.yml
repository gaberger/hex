name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 26.4.0) — used only for workflow_dispatch'
        required: false
        type: string
        default: '26.8.0'
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm64:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-aarch64-apple-darwin-

      - name: Add Rust target
        run: rustup target add "$TARGET"

      - name: Ensure dashboard assets directory exists
        run: mkdir -p hex-nexus/assets/dist

      - name: Build hex-cli
        run: cargo build --release --target "$TARGET" -p hex-cli

      - name: Build hex-nexus
        run: cargo build --release --target "$TARGET" -p hex-nexus

      - name: Determine version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            VERSION="${GIT_REF#refs/tags/v}"
          else
            VERSION="${DISPATCH_VERSION:-26.8.0}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=hex-${VERSION}-${TARGET}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
        run: |
          tar czf "$TARBALL" \
            -C "target/${TARGET}/release" \
            hex hex-nexus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hex-macos-arm64
          path: ${{ steps.version.outputs.tarball }}
          retention-days: 7

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-x86_64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-x86_64-unknown-linux-gnu-

      - name: Add Rust target
        run: rustup target add "$TARGET"

      - name: Ensure dashboard assets directory exists
        run: mkdir -p hex-nexus/assets/dist

      - name: Build hex-cli
        run: cargo build --release --target "$TARGET" -p hex-cli

      - name: Build hex-nexus
        run: cargo build --release --target "$TARGET" -p hex-nexus

      - name: Determine version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            VERSION="${GIT_REF#refs/tags/v}"
          else
            VERSION="${DISPATCH_VERSION:-26.8.0}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=hex-${VERSION}-${TARGET}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
        run: |
          tar czf "$TARBALL" \
            -C "target/${TARGET}/release" \
            hex hex-nexus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hex-linux-x86_64
          path: ${{ steps.version.outputs.tarball }}
          retention-days: 7

  release:
    needs: [build-macos-arm64, build-linux-x86_64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hex-macos-arm64
          path: artifacts/

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hex-linux-x86_64
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine tag name
        id: tag
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG="${GIT_REF#refs/tags/}"
          else
            TAG="v${DISPATCH_VERSION:-26.8.0}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: hex ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print install instructions
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "## Install Instructions" >> "$GITHUB_STEP_SUMMARY"
          printf '```bash\n' >> "$GITHUB_STEP_SUMMARY"
          echo "# macOS ARM64" >> "$GITHUB_STEP_SUMMARY"
          echo "curl -LO https://github.com/gaberger/hex/releases/download/${TAG}/hex-${VERSION}-aarch64-apple-darwin.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "tar xzf hex-${VERSION}-aarch64-apple-darwin.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "sudo mv hex /usr/local/bin/hex" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Linux x86_64" >> "$GITHUB_STEP_SUMMARY"
          echo "curl -LO https://github.com/gaberger/hex/releases/download/${TAG}/hex-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "tar xzf hex-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "sudo mv hex /usr/local/bin/hex" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
