name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 26.4.0)'
        required: true
        type: string
        default: '26.6.0'
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ github.inputs.version || '26.6.0' }}

jobs:
  # Build for multiple platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hex-x86_64-unknown-linux-gnu
          # Linux ARM64
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hex-aarch64-unknown-linux-gnu
          # macOS x86_64
          - runs-on: macos-13
            target: x86_64-apple-darwin
            artifact: hex-x86_64-apple-darwin
          # macOS ARM64
          - runs-on: macos-14
            target: aarch64-apple-darwin
            artifact: hex-aarch64-apple-darwin

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          # For ARM64 Linux
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          fi

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build hex-cli
        run: |
          mkdir -p hex-nexus/assets/dist
          cargo build -p hex-cli --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          # Rename to platform-specific name
          cp "target/${{ matrix.target }}/release/hex" "hex-${{ matrix.target }}"
          chmod +x "hex-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: hex-${{ matrix.target }}
          retention-days: 7

  # Create release and upload binaries
  release:
    needs: build
    runs-on: ubuntu-latest
    # Don't fail if some builds failed - release with what we have
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Map artifact directories to release files
          for dir in artifacts/hex-*; do
            if [ -d "$dir" ]; then
              bin=$(basename "$dir")
              src=$(find "$dir" -type f -maxdepth 1 | head -1)
              if [ -n "$src" ]; then
                # Extract platform from artifact name (e.g., hex-x86_64-unknown-linux-gnu -> hex-x86_64-unknown-linux-gnu)
                name="$bin"
                cp "$src" "release-files/$name"
                echo "  ✓ $name"
              fi
            fi
          done
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: hex v${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: ${{ github.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            release-files/hex-x86_64-unknown-linux-gnu
            release-files/hex-aarch64-unknown-linux-gnu
            release-files/hex-x86_64-apple-darwin
            release-files/hex-aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download commands
        run: |
          echo "## Download Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ env.RELEASE_VERSION }}/hex-x86_64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-x86_64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-x86_64-unknown-linux-gnu /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Linux ARM64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ env.RELEASE_VERSION }}/hex-aarch64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-aarch64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-aarch64-unknown-linux-gnu /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# macOS x86_64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ env.RELEASE_VERSION }}/hex-x86_64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-x86_64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-x86_64-apple-darwin /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# macOS ARM64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ env.RELEASE_VERSION }}/hex-aarch64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-aarch64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-aarch64-apple-darwin /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY