name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 26.4.0)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build for multiple platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hex-x86_64-unknown-linux-gnu
          # Linux ARM64
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hex-aarch64-unknown-linux-gnu
          # macOS x86_64
          - runs-on: macos-13
            target: x86_64-apple-darwin
            artifact: hex-x86_64-apple-darwin
          # macOS ARM64
          - runs-on: macos-14
            target: aarch64-apple-darwin
            artifact: hex-aarch64-apple-darwin

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          # For ARM64 Linux
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_AR=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          fi

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build hex-cli
        run: |
          mkdir -p hex-nexus/assets/dist
          cargo build -p hex-cli --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          # Rename to platform-specific name
          cp "target/${{ matrix.target }}/release/hex" "hex-${{ matrix.target }}"
          chmod +x "hex-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: hex-${{ matrix.target }}
          retention-days: 7

  # Create release and upload binaries
  release:
    needs: build
    runs-on: ubuntu-latest
    # Don't fail if some builds failed - release with what we have
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Only copy files that exist
          for f in hex-x86_64-unknown-linux-gnu hex-aarch64-unknown-linux-gnu hex-x86_64-apple-darwin hex-aarch64-apple-darwin; do
            if [ -f "$f" ]; then
              cp "$f" "release-files/$f"
              echo "  ✓ $f"
            else
              echo "  ✗ $f (skipped)"
            fi
          done
          ls -la release-files/

      - name: Create Release
        if: env.GITHUB_TOKEN != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.inputs.version }}
          name: hex v${{ github.inputs.version }}
          draft: false
          prerelease: ${{ github.inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-files/hex-x86_64-unknown-linux-gnu
            release-files/hex-aarch64-unknown-linux-gnu
            release-files/hex-x86_64-apple-darwin
            release-files/hex-aarch64-apple-darwin

      - name: Print download commands
        run: |
          echo "## Download Commands" >> $GITHUB_STEP_SUMMARY
          echo "```bash" >> $GITHUB_STEP_SUMMARY
          echo "# Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ github.inputs.version }}/hex-x86_64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-x86_64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-x86_64-unknown-linux-gnu /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Linux ARM64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ github.inputs.version }}/hex-aarch64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-aarch64-unknown-linux-gnu" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-aarch64-unknown-linux-gnu /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# macOS x86_64" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ github.inputs.version }}/hex-x86_64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-x86_64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-x86_64-apple-darwin /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# macOS ARM64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "curl -LO https://github.com/anthropic-hex/hex/releases/download/v${{ github.inputs.version }}/hex-aarch64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x hex-aarch64-apple-darwin" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv hex-aarch64-apple-darwin /usr/local/bin/hex" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY