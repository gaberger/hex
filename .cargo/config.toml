# ADR-064: Rust compilation performance
# See docs/adrs/ADR-064-rust-compilation-performance.md

[build]
jobs = 12                    # Match CPU core count (Apple M2 Max)
# rustc-wrapper = "sccache" # Uncomment after: brew install sccache

[target.aarch64-apple-darwin]
# Uncomment after: brew install llvm
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
