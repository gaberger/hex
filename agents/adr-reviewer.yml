# adr-reviewer — Agent definition for ADR consistency validation
# Checks new/updated ADRs against all existing ones for contradictions

name: adr-reviewer
type: reviewer
version: "1.0.0"
description: >
  Reviews Architecture Decision Records for scope conflicts, architectural drift,
  supersession gaps, stale references, and metadata issues. Runs automatically
  when ADRs are created or updated. Produces a findings report with severity
  levels (CRITICAL, WARNING, INFO) and blocks the pipeline on CRITICAL findings.

model:
  tier: 1
  preferred: haiku
  fallback: local
  upgrade_to: sonnet
  upgrade_condition: >
    Upgrade to Sonnet when semantic comparison is needed (scope conflict or
    architectural drift detection requires LLM reasoning about domain overlap).

context:
  load_strategy:
    - level: L2
      scope: "docs/adrs/**"
      purpose: All ADR files for cross-reference analysis
    - level: L1
      scope: "CLAUDE.md"
      purpose: Check for stale ADR references in project instructions
    - level: L1
      scope: "skills/**"
      purpose: Check for stale ADR references in skills
    - level: L1
      scope: "agents/**"
      purpose: Check for stale ADR references in agent definitions

  token_budget:
    max: 50000
    reserved_response: 10000
    allocation:
      adr_files: 30000
      reference_files: 10000

constraints:
  - Never modify ADR files directly — only report findings
  - CRITICAL findings must reference the exact conflicting line/section
  - Supersession chain must be validated bidirectionally (A references B AND B references A)
  - Stale references must include the replacement ADR number
  - Duplicate numbering is always CRITICAL severity
  - When creating a new project/app, always include README.md and start.sh (see project-output skill)

tools:
  required:
    - Read
    - Glob
    - Grep
    - hex_adr_list
    - hex_adr_search
    - hex_adr_status
  denied:
    - Write
    - Edit
    - Bash

inputs:
  changed_adr:
    type: string
    required: false
    description: "Path to the ADR that was created or updated (omit for full review)"
  adr_directory:
    type: string
    required: false
    default: "docs/adrs"
    description: "Directory containing all ADR files"

outputs:
  report:
    type: ReviewReport
    schema:
      reviewed_adr: string
      timestamp: string
      findings:
        type: array
        items:
          severity: "CRITICAL | WARNING | INFO"
          check: "scope_conflict | architectural_drift | supersession_gap | stale_reference | metadata_issue"
          description: string
          source_adr: string
          conflicting_adr: string
          recommendation: string
      verdict: "PASS | NEEDS_ACTION | BLOCKING"
      summary:
        critical_count: number
        warning_count: number
        info_count: number

triggers:
  - event: file_changed
    pattern: "docs/adrs/ADR-*.md"
    action: review_changed_adr
  - event: command
    pattern: "hex adr review"
    action: review_all

workflow:
  phases:
    - id: load_adrs
      name: "Load — Collect All ADRs"
      description: >
        Read all ADR files from the repository and parse their metadata
        (number, title, status, date, supersedes/superseded-by fields).
      steps:
        - Glob for all docs/adrs/ADR-*.md files
        - Parse each ADR header for metadata (status, date, supersedes)
        - Build an in-memory index of ADR numbers, titles, and statuses
        - If changed_adr input is provided, mark it as the focus ADR

    - id: check_metadata
      name: "Check 1 — Metadata Validation"
      description: >
        Verify each ADR has valid metadata: unique number, valid status,
        date present, and no duplicate numbering.
      steps:
        - Verify all ADR numbers are unique (duplicate = CRITICAL)
        - Verify each ADR has a valid status (Accepted, Deprecated, Superseded, Proposed, Rejected)
        - Verify each ADR has a date field
        - Flag missing or malformed metadata as WARNING

    - id: check_scope_conflicts
      name: "Check 2 — Scope Conflict Detection"
      description: >
        Detect ADRs that address the same architectural concern with
        contradictory decisions. Requires semantic comparison.
      steps:
        - Extract the "Context" and "Decision" sections from each active ADR
        - Compare the focus ADR against all other active ADRs
        - Flag pairs where scope overlaps but decisions contradict (CRITICAL)
        - Flag pairs where scope overlaps but decisions align (INFO)

    - id: check_supersession
      name: "Check 3 — Supersession Chain Validation"
      description: >
        Verify that supersession references are bidirectional and that
        superseded ADRs have status "Superseded".
      steps:
        - For each ADR with "Supersedes" field, verify the target ADR exists
        - Verify the target ADR has a "Superseded by" back-reference
        - Verify the target ADR status is "Superseded"
        - Flag broken chains as CRITICAL

    - id: check_stale_references
      name: "Check 4 — Stale Reference Detection"
      description: >
        Find references to deprecated/superseded ADRs in CLAUDE.md,
        skills, agents, and other ADRs.
      steps:
        - Collect all ADRs with status Deprecated or Superseded
        - Grep CLAUDE.md, skills/**, and agents/** for references to those ADR numbers
        - For each stale reference, identify the replacement ADR (if any)
        - Flag stale references as WARNING (with replacement suggestion)

    - id: check_architectural_drift
      name: "Check 5 — Architectural Drift Detection"
      description: >
        Check whether the codebase has drifted from active ADR decisions.
        Requires semantic reasoning about intent vs implementation.
      steps:
        - For each active ADR, extract the core decision
        - Check if CLAUDE.md constraints align with ADR decisions
        - Check if agent/skill definitions reference correct ADR numbers
        - Flag drift as WARNING (may require Sonnet upgrade for accuracy)

    - id: produce_verdict
      name: "Verdict — Aggregate Findings"
      description: >
        Aggregate all findings into a verdict. BLOCKING if any CRITICAL
        findings exist. NEEDS_ACTION if only WARNINGs. PASS if clean.
      steps:
        - Count findings by severity
        - "BLOCKING: 1+ CRITICAL findings — pipeline must stop"
        - "NEEDS_ACTION: 1+ WARNING findings, 0 CRITICAL — proceed with caution"
        - "PASS: only INFO findings or no findings"
        - Output structured ReviewReport JSON

feedback_loop:
  enabled: false
  reason: Review agent produces a report, not code — no iteration needed
